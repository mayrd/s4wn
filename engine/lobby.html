<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S4WN — Siedler 4 Web-Native</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-dark: #0a0f1e;
            --bg-mid: #111833;
            --bg-light: #1a2540;
            --accent: #8ab4f8;
            --accent-dim: #506080;
            --gold: #d4a843;
            --gold-bright: #f0d078;
            --text: #c8d6e5;
            --text-dim: #5a6a8a;
            --success: #4caf50;
            --error: #f44336;
        }

        html, body { width: 100%; height: 100%; overflow: hidden; }
        body {
            background: var(--bg-dark);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: var(--text);
        }

        /* ── Title / Loading Screen ─────────────────────────────────── */
        #title-screen {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, #111833 0%, #0a0f1e 70%);
            transition: opacity 0.8s ease-out;
        }
        #title-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .title-logo {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            background: linear-gradient(135deg, var(--gold-bright), var(--gold), #b8860b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            margin-bottom: 0.5rem;
            animation: logoGlow 3s ease-in-out infinite;
        }

        @keyframes logoGlow {
            0%, 100% { filter: brightness(1.0); }
            50% { filter: brightness(1.3); }
        }

        .title-subtitle {
            font-size: 1rem;
            color: var(--accent-dim);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 3rem;
        }

        .title-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .loading-bar-container {
            width: 300px;
            height: 4px;
            background: var(--bg-light);
            border-radius: 2px;
            overflow: hidden;
        }

        .loading-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--gold), var(--gold-bright));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .loading-text {
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 0.1em;
        }

        .title-version {
            position: absolute;
            bottom: 1.5rem;
            font-size: 0.65rem;
            color: var(--text-dim);
            letter-spacing: 0.15em;
        }

        /* ── Main App ───────────────────────────────────────────────── */
        #app {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
        }

        /* ── Top Bar ────────────────────────────────────────────────── */
        #top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 1.5rem;
            background: var(--bg-mid);
            border-bottom: 1px solid var(--bg-light);
            height: 48px;
            flex-shrink: 0;
        }

        .top-bar-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--gold);
            letter-spacing: 0.1em;
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--error);
        }
        .status-dot.connected { background: var(--success); }

        /* ── Content Area ───────────────────────────────────────────── */
        #content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ── Lobby Panel ────────────────────────────────────────────── */
        #lobby-panel {
            width: 100%;
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            overflow-y: auto;
        }

        .lobby-section {
            margin-bottom: 2rem;
        }

        .lobby-section-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--bg-light);
        }

        /* ── Player Name Input ──────────────────────────────────────── */
        .name-input-row {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .name-input {
            flex: 1;
            padding: 0.6rem 1rem;
            background: var(--bg-mid);
            border: 1px solid var(--bg-light);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .name-input:focus { border-color: var(--accent); }

        .btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.05em;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: #1a1a1a;
        }
        .btn-primary:hover { filter: brightness(1.15); }

        .btn-secondary {
            background: var(--bg-light);
            color: var(--text);
        }
        .btn-secondary:hover { background: #243050; }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ── Room List ──────────────────────────────────────────────── */
        .room-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .room-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            background: var(--bg-mid);
            border: 1px solid var(--bg-light);
            border-radius: 8px;
            transition: border-color 0.2s;
        }
        .room-card:hover { border-color: var(--accent-dim); }

        .room-info {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .room-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text);
        }

        .room-meta {
            font-size: 0.72rem;
            color: var(--text-dim);
        }

        .room-players {
            font-size: 0.8rem;
            color: var(--accent);
            margin-right: 1rem;
        }

        .room-empty-msg {
            text-align: center;
            padding: 2rem;
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        /* ── Create Room Form ───────────────────────────────────────── */
        .create-room-row {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .create-room-input {
            flex: 1;
            padding: 0.5rem 0.75rem;
            background: var(--bg-mid);
            border: 1px solid var(--bg-light);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.85rem;
            outline: none;
        }
        .create-room-input:focus { border-color: var(--accent); }

        .player-count-select {
            padding: 0.5rem;
            background: var(--bg-mid);
            border: 1px solid var(--bg-light);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.85rem;
            outline: none;
        }

        /* ── Chat ───────────────────────────────────────────────────── */
        #chat-panel {
            width: 280px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: var(--bg-mid);
            border-left: 1px solid var(--bg-light);
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .chat-msg {
            font-size: 0.78rem;
            line-height: 1.4;
        }
        .chat-msg .sender { color: var(--gold); font-weight: 600; }
        .chat-msg .text { color: var(--text); }
        .chat-msg.system { color: var(--text-dim); font-style: italic; }

        #chat-input-row {
            display: flex;
            padding: 0.5rem;
            gap: 0.5rem;
            border-top: 1px solid var(--bg-light);
        }

        #chat-input {
            flex: 1;
            padding: 0.4rem 0.6rem;
            background: var(--bg-dark);
            border: 1px solid var(--bg-light);
            border-radius: 4px;
            color: var(--text);
            font-size: 0.8rem;
            outline: none;
        }
        #chat-input:focus { border-color: var(--accent); }

        /* ── Room View (inside a room) ──────────────────────────────── */
        #room-view {
            display: none;
            width: 100%;
            max-width: 700px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .room-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .room-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--gold);
        }

        .player-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .player-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 1rem;
            background: var(--bg-mid);
            border: 1px solid var(--bg-light);
            border-radius: 6px;
        }

        .player-host-icon {
            color: var(--gold);
            font-size: 0.9rem;
        }

        .player-name {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .player-ready {
            margin-left: auto;
            font-size: 0.72rem;
            color: var(--success);
        }

        .room-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
        }

        /* ── Game Canvas (shown when game starts) ───────────────────── */
        #game-view {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
        }

        #game-canvas-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* ── HUD ────────────────────────────────────────────────────── */
        #hud {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(10, 15, 30, 0.85);
            border: 1px solid var(--bg-light);
            border-radius: 6px;
            padding: 0.5rem 0.75rem;
            font-size: 0.72rem;
            color: var(--text);
            pointer-events: none;
        }

        .hud-row {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            margin-bottom: 0.2rem;
        }

        .hud-icon {
            width: 14px;
            text-align: center;
        }

        /* ── Notifications ──────────────────────────────────────────── */
        #notifications {
            position: fixed;
            top: 60px;
            right: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            z-index: 500;
        }

        .notification {
            padding: 0.6rem 1rem;
            background: var(--bg-mid);
            border: 1px solid var(--bg-light);
            border-radius: 6px;
            font-size: 0.8rem;
            animation: slideIn 0.3s ease;
            max-width: 300px;
        }
        .notification.error { border-color: var(--error); color: var(--error); }
        .notification.success { border-color: var(--success); color: var(--success); }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* ── Scrollbar ──────────────────────────────────────────────── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--bg-light); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-dim); }
    </style>
</head>
<body>

    <!-- ── Title / Loading Screen ──────────────────────────────────── -->
    <div id="title-screen">
        <div class="title-logo">S4WN</div>
        <div class="title-subtitle">Siedler 4 Web-Native</div>
        <div class="title-loading">
            <div class="loading-bar-container">
                <div class="loading-bar" id="loading-bar"></div>
            </div>
            <div class="loading-text" id="loading-text">Initializing…</div>
        </div>
        <div class="title-version">v0.1.0 — Phase 3: Multiplayer</div>
    </div>

    <!-- ── Notifications ───────────────────────────────────────────── -->
    <div id="notifications"></div>

    <!-- ── Main App ────────────────────────────────────────────────── -->
    <div id="app">
        <!-- Top Bar -->
        <div id="top-bar">
            <div class="top-bar-title">S4WN</div>
            <div class="top-bar-right">
                <div class="connection-status">
                    <div class="status-dot" id="status-dot"></div>
                    <span id="status-text">Disconnected</span>
                </div>
            </div>
        </div>

        <!-- Content -->
        <div id="content">
            <!-- ── Lobby Panel ─────────────────────────────────────── -->
            <div id="lobby-panel">
                <!-- Player Name -->
                <div class="lobby-section">
                    <div class="lobby-section-title">Player</div>
                    <div class="name-input-row">
                        <input type="text" class="name-input" id="player-name"
                               placeholder="Enter your name…" maxlength="20" value="">
                        <button class="btn btn-primary" id="btn-connect" disabled>Connect</button>
                    </div>
                </div>

                <!-- Room List -->
                <div class="lobby-section">
                    <div class="lobby-section-title">Game Rooms</div>
                    <div class="room-list" id="room-list">
                        <div class="room-empty-msg">No rooms yet. Create one to start playing!</div>
                    </div>
                    <div class="create-room-row">
                        <input type="text" class="create-room-input" id="room-name-input"
                               placeholder="Room name…" maxlength="30" value="S4WN Game">
                        <select class="player-count-select" id="room-max-players">
                            <option value="2">2 Players</option>
                            <option value="3">3 Players</option>
                            <option value="4" selected>4 Players</option>
                        </select>
                        <button class="btn btn-secondary" id="btn-create-room" disabled>Create Room</button>
                    </div>
                </div>
            </div>

            <!-- ── Room View ───────────────────────────────────────── -->
            <div id="room-view">
                <div class="room-header">
                    <div>
                        <div class="room-title" id="room-view-name">Room Name</div>
                        <div class="room-meta" id="room-view-meta">1 / 4 players</div>
                    </div>
                    <button class="btn btn-secondary" id="btn-leave-room">Leave Room</button>
                </div>

                <div class="lobby-section">
                    <div class="lobby-section-title">Players</div>
                    <div class="player-list" id="room-player-list"></div>
                </div>

                <div class="room-actions">
                    <button class="btn btn-primary" id="btn-start-game" disabled>Start Game</button>
                </div>
            </div>

            <!-- ── Chat Panel ──────────────────────────────────────── -->
            <div id="chat-panel">
                <div id="chat-messages"></div>
                <div id="chat-input-row">
                    <input type="text" id="chat-input" placeholder="Type a message…" maxlength="200">
                    <button class="btn btn-secondary" id="btn-send-chat" style="padding: 0.4rem 0.6rem;">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // ── State ────────────────────────────────────────────────────
        const state = {
            connected: false,
            playerId: null,
            playerName: '',
            currentRoom: null,
            rooms: [],
            ws: null,
        };

        // ── DOM References ──────────────────────────────────────────
        const titleScreen = document.getElementById('title-screen');
        const loadingBar = document.getElementById('loading-bar');
        const loadingText = document.getElementById('loading-text');
        const app = document.getElementById('app');
        const playerNameInput = document.getElementById('player-name');
        const btnConnect = document.getElementById('btn-connect');
        const btnCreateRoom = document.getElementById('btn-create-room');
        const roomNameInput = document.getElementById('room-name-input');
        const roomMaxPlayers = document.getElementById('room-max-players');
        const roomList = document.getElementById('room-list');
        const lobbyPanel = document.getElementById('lobby-panel');
        const roomView = document.getElementById('room-view');
        const roomViewName = document.getElementById('room-view-name');
        const roomViewMeta = document.getElementById('room-view-meta');
        const roomPlayerList = document.getElementById('room-player-list');
        const btnLeaveRoom = document.getElementById('btn-leave-room');
        const btnStartGame = document.getElementById('btn-start-game');
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const btnSendChat = document.getElementById('btn-send-chat');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const notifications = document.getElementById('notifications');

        // ── Loading Screen ──────────────────────────────────────────
        function setLoadingProgress(pct, text) {
            loadingBar.style.width = pct + '%';
            if (text) loadingText.textContent = text;
        }

        function showApp() {
            titleScreen.classList.add('fade-out');
            setTimeout(() => {
                titleScreen.style.display = 'none';
                app.style.display = 'flex';
            }, 800);
        }

        // ── Notifications ───────────────────────────────────────────
        function notify(msg, type = '') {
            const el = document.createElement('div');
            el.className = 'notification ' + type;
            el.textContent = msg;
            notifications.appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }

        // ── WebSocket ───────────────────────────────────────────────
        function getWsUrl() {
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const host = location.host;
            return `${proto}//${host}/ws`;
        }

        function connect() {
            const name = playerNameInput.value.trim();
            if (!name) {
                notify('Please enter your name', 'error');
                return;
            }
            state.playerName = name;

            setLoadingProgress(30, 'Connecting to server…');

            try {
                const ws = new WebSocket(getWsUrl());
                state.ws = ws;

                ws.onopen = () => {
                    state.connected = true;
                    statusDot.classList.add('connected');
                    statusText.textContent = 'Connected';
                    btnCreateRoom.disabled = false;
                    setLoadingProgress(60, 'Joining lobby…');

                    // Send join
                    ws.send(JSON.stringify({ type: 'player_join', name }));
                    // Request room list
                    ws.send(JSON.stringify({ type: 'room_list', rooms: [] }));
                };

                ws.onmessage = (event) => {
                    try {
                        const msg = JSON.parse(event.data);
                        handleMessage(msg);
                    } catch (e) {
                        console.error('Failed to parse message:', e);
                    }
                };

                ws.onclose = () => {
                    state.connected = false;
                    statusDot.classList.remove('connected');
                    statusText.textContent = 'Disconnected';
                    btnCreateRoom.disabled = true;
                    notify('Disconnected from server', 'error');
                };

                ws.onerror = (e) => {
                    console.error('WebSocket error:', e);
                    notify('Connection failed. Is the server running?', 'error');
                    setLoadingProgress(0, 'Connection failed');
                };
            } catch (e) {
                notify('Failed to connect: ' + e.message, 'error');
            }
        }

        function handleMessage(msg) {
            console.log('Received:', msg);

            switch (msg.type) {
                case 'welcome':
                    state.playerId = msg.player_id;
                    setLoadingProgress(100, 'Ready!');
                    setTimeout(() => showApp(), 500);
                    addChatSystem(`Welcome! You are player #${msg.player_id}`);
                    break;

                case 'room_list':
                    state.rooms = msg.rooms || [];
                    renderRoomList();
                    break;

                case 'room_update':
                    if (state.currentRoom && msg.room.id === state.currentRoom) {
                        renderRoomView(msg.room);
                    }
                    // Also update in room list
                    const idx = state.rooms.findIndex(r => r.id === msg.room.id);
                    if (idx >= 0) {
                        state.rooms[idx] = msg.room;
                    } else {
                        state.rooms.push(msg.room);
                    }
                    renderRoomList();
                    break;

                case 'chat':
                    if (msg.player_id === 0) {
                        addChatSystem(msg.text);
                    } else {
                        addChatMessage(`Player ${msg.player_id}`, msg.text);
                    }
                    break;

                case 'error':
                    notify(msg.message, 'error');
                    break;

                case 'game_state_sync':
                    addChatSystem('Game started! (state sync received)');
                    // TODO: transition to game view
                    break;

                case 'ping':
                    state.ws.send(JSON.stringify({ type: 'pong', timestamp: msg.timestamp }));
                    break;

                default:
                    console.log('Unhandled message type:', msg.type);
            }
        }

        // ── Room List Rendering ─────────────────────────────────────
        function renderRoomList() {
            if (state.rooms.length === 0) {
                roomList.innerHTML = '<div class="room-empty-msg">No rooms yet. Create one to start playing!</div>';
                return;
            }

            roomList.innerHTML = state.rooms.map(room => `
                <div class="room-card">
                    <div class="room-info">
                        <div class="room-name">${escapeHtml(room.name)}</div>
                        <div class="room-meta">Host: ${escapeHtml(room.host_name)} ${room.in_progress ? '· In Progress' : ''}</div>
                    </div>
                    <div class="room-players">${room.player_count}/${room.max_players}</div>
                    <button class="btn btn-secondary" onclick="window.__joinRoom('${room.id}')"
                            ${room.in_progress || room.player_count >= room.max_players ? 'disabled' : ''}>
                        Join
                    </button>
                </div>
            `).join('');
        }

        function renderRoomView(room) {
            lobbyPanel.style.display = 'none';
            roomView.style.display = 'block';
            roomViewName.textContent = room.name;
            roomViewMeta.textContent = `${room.player_count} / ${room.max_players} players`;

            // Build player list
            // We don't have detailed player info from RoomInfo, so show generic
            roomPlayerList.innerHTML = '';
            for (let i = 0; i < room.player_count; i++) {
                const isHost = i === 0;
                const isYou = i === 0; // simplified
                roomPlayerList.innerHTML += `
                    <div class="player-row">
                        ${isHost ? '<span class="player-host-icon">👑</span>' : '<span style="width:0.9rem"></span>'}
                        <span class="player-name">${isYou ? state.playerName + ' (You)' : 'Player ' + (i + 1)}</span>
                        ${isHost ? '<span class="player-ready">Host</span>' : ''}
                    </div>
                `;
            }

            // Enable start button if host
            btnStartGame.disabled = room.player_count < 2;
        }

        function showLobby() {
            state.currentRoom = null;
            lobbyPanel.style.display = 'block';
            roomView.style.display = 'none';
        }

        // ── Chat ────────────────────────────────────────────────────
        function addChatMessage(sender, text) {
            const el = document.createElement('div');
            el.className = 'chat-msg';
            el.innerHTML = `<span class="sender">${escapeHtml(sender)}:</span> <span class="text">${escapeHtml(text)}</span>`;
            chatMessages.appendChild(el);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addChatSystem(text) {
            const el = document.createElement('div');
            el.className = 'chat-msg system';
            el.textContent = text;
            chatMessages.appendChild(el);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function sendChat() {
            const text = chatInput.value.trim();
            if (!text || !state.connected) return;
            state.ws.send(JSON.stringify({ type: 'chat', player_id: state.playerId, text }));
            chatInput.value = '';
        }

        // ── Helpers ─────────────────────────────────────────────────
        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        // ── Event Handlers ──────────────────────────────────────────
        playerNameInput.addEventListener('input', () => {
            btnConnect.disabled = playerNameInput.value.trim().length === 0;
        });

        playerNameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !btnConnect.disabled) connect();
        });

        btnConnect.addEventListener('click', connect);

        btnCreateRoom.addEventListener('click', () => {
            const name = roomNameInput.value.trim() || 'S4WN Game';
            const max = parseInt(roomMaxPlayers.value);
            state.ws.send(JSON.stringify({ type: 'room_create', name, max_players: max }));
        });

        window.__joinRoom = function(roomId) {
            state.ws.send(JSON.stringify({ type: 'room_join', room_id: roomId }));
            state.currentRoom = roomId;
        };

        btnLeaveRoom.addEventListener('click', () => {
            state.ws.send(JSON.stringify({ type: 'room_leave' }));
            showLobby();
        });

        btnStartGame.addEventListener('click', () => {
            state.ws.send(JSON.stringify({ type: 'game_start' }));
        });

        btnSendChat.addEventListener('click', sendChat);
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendChat();
        });

        // ── Init ────────────────────────────────────────────────────
        setLoadingProgress(10, 'Loading…');

        // Check if player name was saved
        const savedName = localStorage.getItem('s4wn_player_name');
        if (savedName) playerNameInput.value = savedName;

        playerNameInput.addEventListener('change', () => {
            localStorage.setItem('s4wn_player_name', playerNameInput.value.trim());
        });

        setLoadingProgress(20, 'Ready to connect');
    </script>
</body>
</html>
