<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S4WN — Siedler 4 Web-Native</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body {
            background: #0a0f1e;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #header {
            color: #8ab4f8;
            font-size: 1.2rem;
            padding: 0.5rem 1rem;
            text-align: center;
            opacity: 0.9;
            letter-spacing: 0.05em;
        }
        #canvas-container {
            width: min(90vw, 90vh, 900px);
            height: min(90vw, 90vh, 900px);
            border: 1px solid #1a2540;
            border-radius: 8px;
            overflow: hidden;
            background: #080c1a;
            cursor: grab;
            position: relative;
        }
        #canvas-container:active { cursor: grabbing; }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        #status {
            color: #506080;
            font-size: 0.8rem;
            padding: 0.3rem 1rem;
            text-align: center;
            opacity: 0.8;
        }
        #tile-info {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 15, 30, 0.85);
            color: #8ab4f8;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            white-space: nowrap;
        }
        #controls-hint {
            color: #405070;
            font-size: 0.7rem;
            padding: 0.2rem 1rem 0.4rem;
            text-align: center;
            opacity: 0.5;
        }
        #minimap {
            position: absolute;
            bottom: 12px;
            right: 12px;
            width: 150px;
            height: 150px;
            border: 1px solid #1a2540;
            border-radius: 4px;
            background: #080c1a;
        }
        #minimap canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        #stats {
            color: #506080;
            font-size: 0.72rem;
            padding: 0.1rem 1rem;
            text-align: center;
            font-family: 'Courier New', monospace;
            opacity: 0.7;
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body>
    <div id="header">S4WN Engine — Phase 1: Isometric Map + Camera Controls</div>
    <div id="canvas-container">
        <canvas id="game-canvas"></canvas>
        <div id="tile-info"></div>
        <div id="minimap"><canvas id="minimap-canvas"></canvas></div>
    </div>
    <div id="status">Initializing WebAssembly…</div>
    <div id="stats"></div>
    <div id="controls-hint">🖱 Drag to pan &nbsp;|&nbsp; 🔍 Scroll to zoom</div>

    <script type="module">
        import init, {
            init as engineInit,
            render,
            resize,
            on_mouse_down,
            on_mouse_move,
            on_mouse_up,
            on_wheel,
            get_tile_at,
            get_stats,
            get_map_data,
        } from './pkg/s4wn_engine.js';

        async function main() {
            const status = document.getElementById('status');
            const tileInfo = document.getElementById('tile-info');
            const container = document.getElementById('canvas-container');

            try {
                status.textContent = 'Loading WASM module…';
                await init();

                status.textContent = 'Initializing WebGL renderer…';
                const ok = engineInit('game-canvas');
                if (!ok) {
                    status.textContent = 'Error: Engine initialization failed';
                    return;
                }

                status.textContent = 'S4WN Engine running | 64×64 isometric map | Drag to pan, scroll to zoom';

                // ── Minimap ──────────────────────────────────────────
                const minimapCanvas = document.getElementById('minimap-canvas');
                const minimapCtx = minimapCanvas.getContext('2d');
                // Terrain colors matching the Rust enum (same order as Terrain::color())
                const terrainColors = [
                    '#3d993d', // Grass
                    '#267326', // Forest
                    '#8c8073', // Mountain
                    '#2659b3', // Water
                    '#143380', // DeepWater
                    '#d9bf66', // Desert
                    '#4d6640', // Swamp
                    '#e6ebf2', // Snow
                ];

                function renderMinimap() {
                    const mapData = get_map_data();
                    if (!mapData || mapData.length < 4) return;

                    const w = mapData[0] | (mapData[1] << 8);
                    const h = mapData[2] | (mapData[3] << 8);
                    const tileData = mapData.slice(4);

                    // Set canvas resolution
                    minimapCanvas.width = w;
                    minimapCanvas.height = h;

                    const imgData = minimapCtx.createImageData(w, h);
                    for (let i = 0; i < tileData.length; i++) {
                        const terrain = tileData[i] & 0x07; // clamp to 0-7
                        const c = hexToRgb(terrainColors[terrain] || '#000000');
                        imgData.data[i * 4 + 0] = c[0];
                        imgData.data[i * 4 + 1] = c[1];
                        imgData.data[i * 4 + 2] = c[2];
                        imgData.data[i * 4 + 3] = 255;
                    }
                    minimapCtx.putImageData(imgData, 0, 0);
                }

                function hexToRgb(hex) {
                    const r = parseInt(hex.slice(1, 3), 16);
                    const g = parseInt(hex.slice(3, 5), 16);
                    const b = parseInt(hex.slice(5, 7), 16);
                    return [r, g, b];
                }

                // Initial render
                renderMinimap();

                // ── Mouse panning ──────────────────────────────────────
                container.addEventListener('mousedown', (e) => {
                    on_mouse_down(e.offsetX, e.offsetY);
                });
                container.addEventListener('mousemove', (e) => {
                    on_mouse_move(e.offsetX, e.offsetY);

                    // Show tile info on hover
                    const info = get_tile_at(e.offsetX, e.offsetY);
                    if (info) {
                        const t = JSON.parse(info);
                        const res = t.resource ? ` · ${t.resource}` : '';
                        tileInfo.textContent = `${t.terrain}${res} · elev ${t.elevation.toFixed(1)} · (${t.x},${t.y})`;
                        tileInfo.style.opacity = '1';
                    } else {
                        tileInfo.style.opacity = '0';
                    }
                });
                container.addEventListener('mouseup', () => on_mouse_up());
                container.addEventListener('mouseleave', () => {
                    on_mouse_up();
                    tileInfo.style.opacity = '0';
                });

                // ── Zoom ──────────────────────────────────────────────
                container.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    on_wheel(e.deltaY);
                }, { passive: false });

                // ── Touch support (mobile) ────────────────────────────
                let lastTouchDist = 0;
                let touchActive = false;
                container.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if (e.touches.length === 1) {
                        touchActive = true;
                        on_mouse_down(e.touches[0].clientX - container.getBoundingClientRect().left,
                                      e.touches[0].clientY - container.getBoundingClientRect().top);
                    } else if (e.touches.length === 2) {
                        touchActive = false;
                        const dx = e.touches[0].clientX - e.touches[1].clientX;
                        const dy = e.touches[0].clientY - e.touches[1].clientY;
                        lastTouchDist = Math.sqrt(dx * dx + dy * dy);
                    }
                }, { passive: false });
                container.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    if (e.touches.length === 1 && touchActive) {
                        on_mouse_move(e.touches[0].clientX - container.getBoundingClientRect().left,
                                      e.touches[0].clientY - container.getBoundingClientRect().top);
                    } else if (e.touches.length === 2) {
                        const dx = e.touches[0].clientX - e.touches[1].clientX;
                        const dy = e.touches[0].clientY - e.touches[1].clientY;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (lastTouchDist > 0) {
                            const factor = dist / lastTouchDist;
                            on_wheel(factor < 1.0 ? 5.0 : -5.0);
                        }
                        lastTouchDist = dist;
                    }
                }, { passive: false });
                container.addEventListener('touchend', () => on_mouse_up());

                // ── Animation loop ────────────────────────────────────
                const statsEl = document.getElementById('stats');
                function loop(timestamp) {
                    render(timestamp);

                    // Update stats display
                    const s = get_stats();
                    if (s) {
                        const d = JSON.parse(s);
                        statsEl.textContent = `FPS: ${d.fps} | Ticks: ${d.ticks} | Game Time: ${d.game_time}s | Zoom: ${d.zoom}x`;
                    }

                    requestAnimationFrame(loop);
                }
                requestAnimationFrame(loop);

                // ── Resize handler ────────────────────────────────────
                window.addEventListener('resize', () => {
                    resize();
                });

            } catch (err) {
                status.textContent = `Error: ${err}`;
                console.error('S4WN init error:', err);
            }
        }

        main();
    </script>
</body>
</html>
