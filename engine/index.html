<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>S4WN — Siedler 4 Web-Native</title>
<link rel="icon" type="image/svg+xml" href="../assets/ui/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="../assets/ui/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../assets/ui/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="../assets/ui/apple-touch-icon.png">
<link rel="manifest" href="../assets/ui/manifest.json">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes glow {
    0%, 100% { text-shadow: 0 0 20px rgba(255,200,80,0.3), 0 0 60px rgba(255,180,40,0.1); }
    50%      { text-shadow: 0 0 30px rgba(255,200,80,0.5), 0 0 80px rgba(255,180,40,0.2); }
  }

  body {
    background: #080c18;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #e0d8c8;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── Canvas ────────────────────────────────────────────────────────── */
  canvas {
    display: block;
    cursor: grab;
    position: fixed;
    top: 0; left: 0;
    z-index: 1;
  }
  canvas:active { cursor: grabbing; }

  /* ── Loading Screen ─────────────────────────────────────────────────── */
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  @keyframes progressPulse {
    0%, 100% { opacity: 0.7; }
    50%      { opacity: 1.0; }
  }
  #loading-screen {
    position: fixed; inset: 0; z-index: 90;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(8, 12, 24, 0.95);
    backdrop-filter: blur(8px);
  }
  #loading-screen.active { display: flex; }
  .loading-spinner {
    width: 48px; height: 48px;
    border: 4px solid rgba(255,200,80,0.2);
    border-top-color: #ffc850;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loading-text {
    color: #e0d8c8;
    font-size: 18px;
    margin-top: 20px;
    animation: progressPulse 1.5s ease-in-out infinite;
  }
  .loading-bar-wrap {
    width: 260px; height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    margin-top: 16px;
    overflow: hidden;
  }
  .loading-bar-fill {
    width: 0%; height: 100%;
    background: linear-gradient(90deg, #ffc850, #ff8c00);
    border-radius: 3px;
    transition: width 0.3s ease;
  }

  /* ── Splash ────────────────────────────────────────────────────────── */
  #splash {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #0f1528 0%, #060a14 100%);
    transition: opacity 0.8s ease-out;
  }
  #splash.hidden { opacity: 0; pointer-events: none; }
  #splash .title {
    font-size: clamp(48px, 10vw, 96px);
    font-weight: 300; letter-spacing: 0.15em;
    color: #e8c860;
    animation: glow 3s ease-in-out infinite;
  }
  #splash .subtitle {
    font-size: clamp(14px, 3vw, 22px);
    color: #8a8578; letter-spacing: 0.2em;
    margin-top: 8px;
    animation: fadeIn 1s ease-out 0.5s both;
  }
  #splash .logo-img {
    width: clamp(120px, 30vw, 256px);
    height: auto;
    margin-bottom: 16px;
    animation: fadeIn 1s ease-out;
    image-rendering: auto;
  }

  /* ── Menu ──────────────────────────────────────────────────────────── */
  #menu {
    position: fixed; inset: 0; z-index: 90;
    display: none;
    align-items: center; justify-content: center;
    background: rgba(6,10,20,0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  #menu.active { display: flex; animation: fadeIn 0.4s ease-out; }
  .menu-card {
    background: linear-gradient(135deg, rgba(20,28,48,0.95), rgba(12,16,30,0.95));
    border: 1px solid rgba(200,170,100,0.15);
    border-radius: 16px; padding: 40px 36px;
    text-align: center; min-width: 320px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .menu-card h2 {
    font-weight: 300; font-size: 26px;
    color: #c8b878; letter-spacing: 0.1em;
    margin-bottom: 24px;
  }
  .menu-btn {
    display: block; width: 100%;
    margin: 8px 0; padding: 12px 20px;
    font-size: 14px; font-family: inherit; letter-spacing: 0.06em;
    background: rgba(200,170,100,0.08);
    border: 1px solid rgba(200,170,100,0.2);
    border-radius: 8px; color: #d8c890; cursor: pointer;
    transition: all 0.2s;
  }
  .menu-btn:hover {
    background: rgba(200,170,100,0.18);
    border-color: rgba(200,170,100,0.4);
    color: #f0dca0; transform: translateY(-1px);
  }
  .menu-btn.secondary {
    background: rgba(255,255,255,0.03);
    border-color: rgba(255,255,255,0.08);
    color: #888; font-size: 12px;
  }
  .menu-btn.secondary:hover { background: rgba(255,255,255,0.08); color: #aaa; }
  .menu-hint {
    font-size: 11px; color: #555;
    margin-top: 14px; letter-spacing: 0.05em;
  }

  /* ── HUD Overlays ───────────────────────────────────────────────────── */
  #hud-top-left {
    position: fixed; top: 12px; left: 16px; z-index: 10;
    font-family: 'SF Mono', 'Cascadia Code', monospace;
    font-size: 11px; color: rgba(200,200,200,0.7);
    pointer-events: none; line-height: 1.6;
  }
  #hud-top-right {
    position: fixed; top: 12px; right: 16px; z-index: 10;
    font-family: 'SF Mono', 'Cascadia Code', monospace;
    font-size: 11px; color: rgba(200,200,200,0.6);
    pointer-events: none; text-align: right; line-height: 1.6;
  }
  #fps { color: #5a8; font-size: 13px; font-weight: 600; }
  #hud-pop { color: rgba(200,180,140,0.65); font-size: 10px; margin-top: 2px; }

  /* ── Tile tooltip ───────────────────────────────────────────────────── */
  #tile-tip {
    position: fixed; z-index: 15;
    background: rgba(10,15,30,0.9);
    color: #aab8d0; padding: 4px 10px;
    border-radius: 4px; font-size: 12px;
    pointer-events: none; opacity: 0;
    transition: opacity 0.15s;
    font-family: 'SF Mono', monospace;
  }

  /* ── Controls ──────────────────────────────────────────────────────── */
  #controls {
    position: fixed; bottom: 16px; left: 50%;
    transform: translateX(-50%); z-index: 10;
    display: flex; gap: 6px;
  }
  #controls button {
    padding: 6px 14px; font-size: 11px;
    font-family: inherit; letter-spacing: 0.04em;
    background: rgba(20,24,40,0.8);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px; color: #bbb;
    cursor: pointer; transition: all 0.2s;
  }
  #controls button:hover {
    background: rgba(30,36,56,0.9);
    border-color: rgba(255,255,255,0.2); color: #fff;
  }
  #controls button.accent {
    border-color: rgba(200,170,100,0.3); color: #c8b878;
  }

  /* ── Drop Zone ──────────────────────────────────────────────────────── */
  #drop-zone {
    position: fixed; inset: 0; z-index: 50;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.6);
    pointer-events: none; opacity: 0;
    transition: opacity 0.2s;
  }
  #drop-zone.visible { opacity: 1; }
  #drop-zone .msg {
    background: rgba(20,28,48,0.95);
    border: 2px dashed rgba(200,170,100,0.4);
    border-radius: 16px; padding: 40px 60px;
    font-size: 18px; color: #c8b878;
    letter-spacing: 0.06em;
  }

  #fileInput { display: none; }

  /* ── Settings Panel ────────────────────────────────────────────────── */
  #settings-panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 320px; max-width: 90vw; z-index: 95;
    background: linear-gradient(180deg, #0c1225 0%, #080e1c 100%);
    border-left: 1px solid rgba(200,170,100,0.12);
    box-shadow: -8px 0 32px rgba(0,0,0,0.5);
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    padding: 28px 24px;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 20px;
  }
  #settings-panel.open { transform: translateX(0); }
  .settings-backdrop {
    position: fixed; inset: 0; z-index: 94;
    background: rgba(0,0,0,0.4);
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s;
  }
  .settings-backdrop.active { opacity: 1; pointer-events: auto; }
  .settings-header {
    display: flex; justify-content: space-between; align-items: center;
  }
  .settings-header h3 {
    font-weight: 300; font-size: 20px;
    color: #c8b878; letter-spacing: 0.08em;
  }
  .settings-close {
    background: none; border: 1px solid rgba(255,255,255,0.1);
    color: #888; font-size: 18px; width: 32px; height: 32px;
    border-radius: 6px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .settings-close:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .settings-section {
    border-top: 1px solid rgba(255,255,255,0.06);
    padding-top: 16px;
  }
  .settings-section h4 {
    font-size: 11px; font-weight: 500;
    color: #666; text-transform: uppercase;
    letter-spacing: 0.15em; margin-bottom: 12px;
  }
  .setting-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px; font-size: 13px; color: #bbb;
  }
  .setting-row label { flex-shrink: 0; margin-right: 12px; }
  .setting-row input[type=range] {
    flex: 1; height: 4px;
    accent-color: #c8b878;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
  }
  .setting-row .setting-val {
    font-size: 11px; color: #888;
    min-width: 36px; text-align: right;
  }
  .setting-row input[type=checkbox] {
    accent-color: #c8b878; width: 16px; height: 16px;
  }
  .settings-actions {
    display: flex; gap: 8px; margin-top: auto; padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .settings-actions button {
    flex: 1; padding: 10px; font-size: 12px;
    font-family: inherit; letter-spacing: 0.05em;
    border-radius: 6px; cursor: pointer;
    transition: all 0.2s;
  }
  .btn-reset {
    background: rgba(255,80,80,0.08);
    border: 1px solid rgba(255,80,80,0.15);
    color: #c66;
  }
  .btn-reset:hover { background: rgba(255,80,80,0.18); color: #e88; }
  .btn-back {
    background: rgba(200,170,100,0.08);
    border: 1px solid rgba(200,170,100,0.2);
    color: #c8b878;
  }
  .btn-back:hover { background: rgba(200,170,100,0.18); color: #f0dca0; }

  /* ── Resource Bar ───────────────────────────────────────────────────── */
  #resource-bar {
    position: fixed; top: 8px; left: 50%; transform: translateX(-50%);
    z-index: 20;
    display: flex; gap: 6px; align-items: center;
    padding: 6px 14px;
    background: rgba(0,0,0,0.65);
    border: 1px solid rgba(200,170,100,0.2);
    border-radius: 8px;
    font-family: monospace; font-size: 12px;
    pointer-events: none;
    opacity: 0; transition: opacity 0.3s;
  }
  #resource-bar.visible { opacity: 1; }
  .res-item { display: flex; align-items: center; gap: 4px; }
  .res-icon { font-size: 16px; line-height: 1; }
  .res-count { color: #c8b878; min-width: 3em; text-align: right; }
  .res-label { color: #777; font-size: 9px; display: none; }

  /* ── New Game Panel ─────────────────────────────────────────────────── */
  #new-game-panel {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(0,0,0,0.75);
    display: none; align-items: center; justify-content: center;
  }
  #new-game-panel.open { display: flex; }
  .ng-card {
    background: #1a1a2e; border: 1px solid rgba(200,170,100,0.3);
    border-radius: 12px; padding: 28px 32px;
    width: 400px; max-width: 90vw;
  }
  .ng-card h3 { color: #e8d5a0; margin: 0 0 20px; text-align: center; }
  .ng-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .ng-row label { width: 120px; color: #999; font-size: 13px; }
  .ng-row select, .ng-row input {
    flex: 1; padding: 8px 12px; background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
    color: #ddd; font-family: inherit; font-size: 13px;
  }
  .ng-row select:focus, .ng-row input:focus {
    border-color: rgba(200,170,100,0.5); outline: none;
  }
  .ng-actions { display: flex; gap: 10px; margin-top: 24px; }
  .ng-actions button { flex: 1; padding: 10px; border-radius: 6px; cursor: pointer;
    font-family: inherit; font-size: 13px; border: none; transition: all 0.2s; }
  .btn-start { background: #2a4a2a; color: #8c8; border: 1px solid rgba(255,255,255,0.1); }
  .btn-start:hover { background: #3a5a3a; color: #afa; }
  .btn-cancel { background: rgba(255,80,80,0.08); color: #c66; border: 1px solid rgba(255,80,80,0.15); }
  .btn-cancel:hover { background: rgba(255,80,80,0.18); color: #e88; }

  /* ── Minimap ────────────────────────────────────────────────────────── */
  #minimap {
    position: fixed; bottom: 60px; right: 12px;
    z-index: 10;
    width: 150px; height: 150px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px; background: rgba(0,0,0,0.5);
    cursor: pointer;
  }
  /* ── Pause Overlay ──────────────────────────────────────────────────── */
  #pause-overlay {
    position: fixed; inset: 0; z-index: 40;
    background: rgba(0,0,0,0.55);
    display: none; align-items: center; justify-content: center;
    pointer-events: none;
  }
  #pause-overlay.active { display: flex; }
  #pause-overlay .pause-text {
    font-size: 72px; color: rgba(255,255,255,0.3);
    font-family: 'Georgia', serif;
    text-shadow: 0 0 40px rgba(255,255,255,0.1);
    animation: pulse-pause 2s ease-in-out infinite;
  }
  @keyframes pulse-pause {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.6; }
  }

  /* ── Speed Controls ─────────────────────────────────────────────────── */
  #speed-controls {
    position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
    z-index: 20; display: flex; gap: 4px;
  }
  #speed-controls .spd-btn {
    padding: 4px 10px; border-radius: 4px; cursor: pointer;
    font-family: 'SF Mono', 'Cascadia Code', monospace;
    font-size: 11px; color: rgba(200,200,200,0.6);
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    transition: all 0.15s;
  }
  #speed-controls .spd-btn:hover {
    background: rgba(255,255,255,0.1); color: #fff;
  }
  /* ── Building Toolbar ────────────────────────────────────────────────── */
  #build-toolbar {
    position: fixed; left: 8px; top: 50%; transform: translateY(-50%);
    z-index: 15;
    display: flex; flex-direction: column; gap: 3px;
    padding: 6px;
    background: rgba(10,15,30,0.85);
    border: 1px solid rgba(200,170,100,0.15);
    border-radius: 8px;
    max-height: 70vh; overflow-y: auto;
  }
  #build-toolbar .bt-build-btn {
    padding: 6px 10px; border-radius: 4px; cursor: pointer;
    font-family: 'SF Mono', 'Cascadia Code', monospace;
    font-size: 10px; color: rgba(200,200,200,0.7);
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    transition: all 0.15s; text-align: left; white-space: nowrap;
  }
  #build-toolbar .bt-build-btn:hover {
    background: rgba(255,255,255,0.12); color: #fff;
    border-color: rgba(200,170,100,0.3);
  }
  #build-toolbar .bt-build-btn.active {
    background: rgba(200,170,100,0.25); color: #e8d5a0;
    border-color: rgba(200,170,100,0.5);
  }
  #build-toolbar .bt-build-btn:disabled {
    opacity: 0.3; cursor: not-allowed;
  }
  #build-toolbar .bt-build-btn.affordable:not(.active):not(:disabled) {
    color: #8f8; border-color: rgba(100,200,100,0.3);
  }
  .bt-label { display: block; font-size: 8px; color: #666; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 0.1em; }
  /* placement mode cursor */
  canvas.placing { cursor: crosshair !important; }
  #placement-status {
    position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
    z-index: 25; font-size: 12px; color: #e8d5a0;
    background: rgba(0,0,0,0.7); padding: 4px 12px; border-radius: 4px;
    display: none; pointer-events: none;
  }
  #placement-status.visible { display: block; }
  #selection-info {
    position: fixed;
    z-index: 26; padding: 10px 14px; border-radius: 6px;
    background: rgba(0,0,0,0.85); color: #e0d5b0;
    font-size: 11px; font-family: 'SF Mono','Cascadia Code',monospace;
    line-height: 1.5; display: none; pointer-events: none;
    border: 1px solid rgba(200,170,100,0.3);
    max-width: 260px; white-space: nowrap;
  }
  #selection-info.visible { display: block; }
  #selection-info .sel-title { font-size: 13px; font-weight: bold; color: #f0d070; margin-bottom: 4px; }
  #selection-info .sel-stat { color: #aaa; }
  #selection-info .sel-stat span { color: #e0d5b0; }
</style>
</head>
<body>

<div id="splash">
  <img class="logo-img" src="../assets/ui/logo-loading.png" alt="S4WN Logo">
  <div class="title">S4WN</div>
  <div class="subtitle">Siedler 4 Web‑Native</div>
</div>

<div id="menu">
  <div class="menu-card">
    <h2>⚔️ Game Menu</h2>
    <button class="menu-btn" id="btn-load">📂 Load Map</button>
    <button class="menu-btn" id="btn-demo">🗺️ Demo Map</button>
    <button class="menu-btn" onclick="openNewGame()">🆕 New Game</button>
    <button class="menu-btn" onclick="openSettings()">⚙️ Settings</button>
    <button class="menu-btn secondary" onclick="window.open('https://github.com/mayrd/s4wn','_blank')">
      🔗 GitHub Repository
    </button>
    <div class="menu-hint">or press <kbd>L</kbd> to load · <kbd>D</kbd> for demo · <kbd>S</kbd> for settings</div>
  </div>
</div>

<!-- Settings Panel (slide-in from right) -->
<div class="settings-backdrop" id="settings-backdrop" onclick="closeSettings()"></div>
<div id="settings-panel">
  <div class="settings-header">
    <h3>⚙️ Settings</h3>
    <button class="settings-close" onclick="closeSettings()">✕</button>
  </div>

  <div class="settings-section">
    <h4>🎮 Controls</h4>
    <div class="setting-row">
      <label for="set-zoom">Zoom Speed</label>
      <input type="range" id="set-zoom" min="0.5" max="3" step="0.1" oninput="updateSettingVal('set-zoom')">
      <span class="setting-val" id="val-set-zoom">1.0</span>
    </div>
  </div>

  <div class="settings-section">
    <h4>🎨 Graphics</h4>
    <div class="setting-row">
      <label for="set-detail">Terrain Detail</label>
      <input type="range" id="set-detail" min="0" max="2" step="1" oninput="updateSettingVal('set-detail')">
      <span class="setting-val" id="val-set-detail">Med</span>
    </div>
  </div>

  <div class="settings-section">
    <h4>🔊 Audio</h4>
    <div class="setting-row">
      <label for="set-master-vol">Master Volume</label>
      <input type="range" id="set-master-vol" min="0" max="100" step="5" oninput="updateSettingVal('set-master-vol')">
      <span class="setting-val" id="val-set-master-vol">80</span>
    </div>
    <div class="setting-row">
      <label for="set-music">Music</label>
      <input type="checkbox" id="set-music" onchange="saveSettings()">
    </div>
    <div class="setting-row">
      <label for="set-sfx">Sound Effects</label>
      <input type="checkbox" id="set-sfx" onchange="saveSettings()">
    </div>
  </div>

  <div class="settings-actions">
    <button class="btn-reset" onclick="resetSettings()">↺ Reset Defaults</button>
    <button class="btn-back" onclick="closeSettings()">← Back to Game</button>
  </div>
</div>

<!-- New Game Panel -->
<div id="new-game-panel">
  <div class="ng-card">
    <h3>🆕 New Game</h3>
    <div class="ng-row">
      <label>Player Name</label>
      <input type="text" id="ng-name" value="Player 1" maxlength="20">
    </div>
    <div class="ng-row">
      <label>Map</label>
      <select id="ng-map">
        <option value="island">🏝️ Island</option>
        <option value="continents">🌍 Continents</option>
        <option value="rivervalley">🏞️ River Valley</option>
        <option value="highlands">⛰️ Highlands</option>
      </select>
    </div>
    <div class="ng-row">
      <label>Difficulty</label>
      <select id="ng-difficulty">
        <option value="easy">🟢 Easy</option>
        <option value="medium" selected>🟡 Medium</option>
        <option value="hard">🔴 Hard</option>
      </select>
    </div>
    <div class="ng-actions">
      <button class="btn-start" onclick="startNewGame()">▶ Start Game</button>
      <button class="btn-cancel" onclick="closeNewGame()">Cancel</button>
    </div>
  </div>
</div>

<script type="module">
import init, {
    init as engineInit,

    get_tile_at, get_stats, get_map_data,

} from './pkg/s4wn_engine.js?v=10';

// load_map_json is accessed dynamically to avoid cache mismatches
let load_map_json = null;

// ── Terrain colors ──────────────────────────────────────────────────────
const TERRAIN_COLORS = [
    '#3d993d', '#267326', '#8c8073', '#2659b3',
    '#143380', '#d9bf66', '#4d6640', '#e6ebf2',
];

// ── DOM refs ────────────────────────────────────────────────────────────
const splash = document.getElementById('splash');
const menu = document.getElementById('menu');

const hudPop = document.getElementById('hud-pop');
const tileTip = document.getElementById('tile-tip');

const dropZone = document.getElementById('drop-zone');

let engineReady = false;
let showMenu = true;
let selectedBuilding = null; // building index or null
let selectedUnit = null;     // unit id or null

setTimeout(() => {

// ── Pause / Speed controls ────────────────────────────────────────────
function updateSpeedButtons() {

    document.querySelectorAll('#speed-controls .spd-btn').forEach(btn => {

    btn.addEventListener('click', () => setSpeed(parseFloat(btn.dataset.speed)));

window.addEventListener('keydown', (e) => {

// ── Map loading ────────────────────────────────────────────────────────
function triggerLoad() {
    fileInput.click();
}

fileInput.addEventListener('change', (e) => {

});

function loadFile(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const text = e.target.result;
            if (engineReady) {
                if (!load_map_json) {
                    alert('Map loading not available — please refresh the page to get the latest engine.');
                    return;
                }
                const result = load_map_json(text);
                if (result === 'ok') {
                    closeMenu();
                    hudMap.textContent = `Map: ${file.name} | Loading...`;
                } else {
                    alert('Map load error: ' + result);
                }
            } else {
                alert('Engine not ready yet. Please wait...');

        } catch (err) {

}

document.addEventListener('dragover', (e) => {

// ── Building Placement ──────────────────────────────────────────────────
const buildToolbar = document.getElementById('build-toolbar');
const placementStatus = document.getElementById('placement-status');
const BUILDING_ICONS = {
    'Headquarters': '🏛️', 'Sawmill': '🪚', 'Quarry': '⛏️', 'Mine': '⛰️',
    'Blacksmith': '🔨', 'Armory': '⚔️', 'Brewery': '🍺', 'Bakery': '🍞',
    'Butcher': '🔪', 'Tannery': '🪶', 'Farm': '🌾', 'Fishery': '🎣',
    'Lumberjack': '🪓', 'Warehouse': '🏚️',
};

let placementMode = null; // building type string or null
let placementButtons = [];

function showBuildCostTooltip(kindName) {
    const cost = get_build_cost(kindName);
    if (cost && !cost.includes('error')) {
        const c = JSON.parse(cost);
        const parts = Object.entries(c).map(([k,v]) => `${k}:${v}`).join(', ');
        return `Cost: ${parts}`;
    }
    return '';
}

function populateBuildToolbar() {
    const kinds = JSON.parse(list_building_types());
    const label = buildToolbar.querySelector('.bt-label');
    buildToolbar.innerHTML = '';
    buildToolbar.appendChild(label);
    placementButtons = [];
    lastAffordabilityUpdate = 0; // force refresh on next check
    kinds.forEach(name => {
        const btn = document.createElement('button');
        btn.className = 'bt-build-btn';
        btn._buildingName = name;
        const icon = BUILDING_ICONS[name] || '🏗️';
        const costTip = showBuildCostTooltip(name);
        btn.textContent = `${icon} ${name}`;
        btn.title = costTip || name;
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (placementMode === name) {
                // Deselect
                placementMode = null;
                btn.classList.remove('active');
                canvas.classList.remove('placing');
                placementStatus.classList.remove('visible');
            } else {
                // Select new building
                placementButtons.forEach(b => b.classList.remove('active'));
                placementMode = name;
                btn.classList.add('active');
                canvas.classList.add('placing');
                placementStatus.textContent = `Place ${name} — click tile · Right-click/B to cancel`;
                placementStatus.classList.add('visible');
            }
        });
        buildToolbar.appendChild(btn);
        placementButtons.push(btn);
    });
}

function cancelPlacement() {
    placementMode = null;
    placementButtons.forEach(b => b.classList.remove('active'));
    canvas.classList.remove('placing');
    placementStatus.classList.remove('visible');
}

function canAffordAll(needed) {
    // needed: {\"Wood\":5,\"Stone\":2} or error string
    if (!needed || typeof needed === 'string' || needed.error) return false;
    try {
        const raw = get_resource_counts();
        if (!raw) return false;
        const resources = JSON.parse(raw);
        for (const [name, amount] of Object.entries(needed)) {
            if ((resources[name] || 0) < amount) return false;
        }
        return true;
    } catch (e) {
        return false;
    }
}

let lastAffordabilityUpdate = 0;
function refreshBuildingAffordability() {
    if (!engineReady || placementButtons.length === 0) return;
    const now = performance.now();
    if (now - lastAffordabilityUpdate < 2000) return;
    lastAffordabilityUpdate = now;

    placementButtons.forEach(btn => {
        const name = btn._buildingName;
        if (!name) return;
        const costJson = get_build_cost(name);
        let cost;
        try { cost = JSON.parse(costJson); } catch(e) { cost = null; }
        const affordable = cost && !cost.error && canAffordAll(cost);
        btn.disabled = !affordable;
        if (affordable) {
            btn.classList.add('affordable');
        } else {
            btn.classList.remove('affordable');
            // Cancel placement if current building becomes unaffordable
            if (placementMode === name) {
                cancelPlacement();
            }
        }
    });
}

// Keyboard shortcut: B to enter build mode, Escape to cancel
window.addEventListener('keydown', (e) => {
    if (showMenu) return;
    if (e.key.toLowerCase() === 'b' && !placementMode) {
        // Select first available building
        populateBuildToolbar(); // refresh
        if (placementButtons.length > 0) placementButtons[0].click();
    } else if (e.key === 'Escape' && placementMode) {
        cancelPlacement();
    }
});

// Canvas click: placement mode OR selection
canvas.addEventListener('click', (e) => {
    if (!engineReady) return;

    if (placementMode) {
        // ── Placement mode ──
        const info = get_tile_at(e.offsetX, e.offsetY);
        if (!info) return;
        const t = JSON.parse(info);
        const result = try_place_building(placementMode, t.x, t.y);
        const r = JSON.parse(result);
        if (r.ok) {
            placementStatus.textContent = `✅ ${r.kind} placed at (${t.x},${t.y})`;
            lastAffordabilityUpdate = 0; // immediate refresh
        } else {
            placementStatus.textContent = `❌ ${r.error}`;
            setTimeout(() => {
                if (placementMode) placementStatus.textContent = `Place ${placementMode} — click tile · Esc to cancel`;
            }, 2000);
        }
        lastPopUpdate = 0;
        return;
    }

    // ── Selection mode (not in placement) ──
    const info = get_tile_at(e.offsetX, e.offsetY);
    if (!info) { hideSelection(); return; }
    const t = JSON.parse(info);

    // Check if any building is at this tile
    try {
        const bRaw = get_building_summary();
        const unitsRaw = get_unit_summary();
        if (!bRaw) { hideSelection(); return; }
        const buildings = JSON.parse(bRaw);

        // Find building at this tile
        const bldgIdx = buildings.findIndex(b => b.x === t.x && b.y === t.y);
        if (bldgIdx >= 0) {
            showBuildingInfo(bldgIdx, e.clientX, e.clientY);
            return;
        }

        // Find nearest unit within 1 tile
        if (unitsRaw) {
            const units = JSON.parse(unitsRaw);
            let nearest = null, nearestDist = 1.5;
            for (const u of units) {
                const dx = u.x - t.x, dy = u.y - t.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < nearestDist) {
                    nearestDist = dist;
                    nearest = u;
                }
            }
            if (nearest) {
                showUnitInfo(nearest.id, e.clientX, e.clientY);
                return;
            }
        }
    } catch(_) {}

    hideSelection();
});

// ── Selection info display ─────────────────────────────────────────────
function showBuildingInfo(idx, cx, cy) {
    if (!get_building_info) return;
    const raw = get_building_info(idx);
    if (!raw) return;
    try {
        const b = JSON.parse(raw);
        if (b.error) { hideSelection(); return; }
        selectedBuilding = idx;
        selectedUnit = null;

        const pct = Math.round(b.construction * 100);
        const statusIcon = b.complete ? '✅' : pct > 0 ? `🚧 ${pct}%` : '📐';
        const workers = b.workers.length > 0 ? `👷 ${b.workers.length}/${b.max_workers}` : '⚪ No workers';
        const prod = b.production_interval > 0
            ? `⚙️ Every ${(b.production_interval/10).toFixed(1)}s` : '';

        let obuf = '';
        try {
            const ob = JSON.parse(JSON.stringify(b.output_buffer));
            const keys = Object.keys(ob);
            if (keys.length > 0) {
                obuf = '📤 ' + keys.map(k => `${k}:${ob[k]}`).join(', ');
            }
        } catch(_) {}

        selInfo.innerHTML = `
            <div class="sel-title">${b.kind}</div>
            <div class="sel-stat">Status: <span>${statusIcon}</span></div>
            <div class="sel-stat">Pos: <span>(${b.x}, ${b.y})</span></div>
            <div class="sel-stat">Workers: <span>${workers}</span></div>
            ${prod ? `<div class="sel-stat">Production: <span>${prod}</span></div>` : ''}
            ${obuf ? `<div class="sel-stat">${obuf}</div>` : ''}
        `;
        positionSelInfo(cx, cy);
    } catch(_) { hideSelection(); }
}

function showUnitInfo(id, cx, cy) {
    if (!get_unit_info) return;
    const raw = get_unit_info(id);
    if (!raw) return;
    try {
        const u = JSON.parse(raw);
        if (u.error) { hideSelection(); return; }
        selectedUnit = id;
        selectedBuilding = null;

        const hpPct = Math.round(u.hp / u.max_hp * 100);
        const hpBar = hpPct > 80 ? '🟢' : hpPct > 40 ? '🟡' : '🔴';
        const bldg = u.assigned_building !== null ? `🏠 Bldg #${u.assigned_building}` : '';
        const tgt = u.target !== null ? `🎯 Target #${u.target}` : '';

        selInfo.innerHTML = `
            <div class="sel-title">${u.kind} #${u.id}</div>
            <div class="sel-stat">HP: <span>${hpBar} ${u.hp}/${u.max_hp} (${hpPct}%)</span></div>
            <div class="sel-stat">State: <span>${u.state}</span></div>
            ${bldg ? `<div class="sel-stat">${bldg}</div>` : ''}
            ${tgt ? `<div class="sel-stat">${tgt}</div>` : ''}
        `;
        positionSelInfo(cx, cy);
    } catch(_) { hideSelection(); }
}

function positionSelInfo(cx, cy) {
    selInfo.classList.add('visible');
    // Position near cursor, keeping within viewport
    let left = cx + 16, top = cy - 10;
    const rect = selInfo.getBoundingClientRect();
    if (left + 270 > window.innerWidth) left = cx - 270;
    if (top + 150 > window.innerHeight) top = cy - 160;
    selInfo.style.left = Math.max(4, left) + 'px';
    selInfo.style.top = Math.max(4, top) + 'px';
}

function hideSelection() {
    selectedBuilding = null;
    selectedUnit = null;
    selInfo.classList.remove('visible');
}

// Close selection on Escape or click elsewhere
document.addEventListener('click', (e) => {
    if (!selInfo.classList.contains('visible')) return;
    if (!e.target.closest('#selection-info') && e.target !== canvas) {
        hideSelection();
    }
});

// ── Keyboard shortcuts ─────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    switch (e.key.toLowerCase()) {
        case 'l':

            break;
        case 's':

            break;

                closeSettings();

                showMenu ? closeMenu() : openMenu();

});

// ── Buttons ────────────────────────────────────────────────────────────
document.getElementById('btn-load').addEventListener('click', triggerLoad);
document.getElementById('btn-load2').addEventListener('click', triggerLoad);

// ── Canvas sizing ──────────────────────────────────────────────────────
function resizeCanvas() {

window.addEventListener('resize', resizeCanvas);

// ── Mouse / touch events ───────────────────────────────────────────────
canvas.addEventListener('mousedown', (e) => {
    if (showMenu) return;
    on_mouse_down(e.offsetX, e.offsetY);
});
canvas.addEventListener('mousemove', (e) => {
    if (showMenu) return;
    on_mouse_move(e.offsetX, e.offsetY);
    if (engineReady) {
        const info = get_tile_at(e.offsetX, e.offsetY);
        if (info) {
            const t = JSON.parse(info);
            const res = t.resource !== 'null' ? ` · ${t.resource}` : '';
            tileTip.textContent = `${t.terrain}${res} · elev ${t.elevation} · (${t.x},${t.y})`;
            tileTip.style.opacity = '1';
            tileTip.style.left = (e.clientX + 16) + 'px';
            tileTip.style.top = (e.clientY - 8) + 'px';
        } else {
            tileTip.style.opacity = '0';
        }
    }
});
canvas.addEventListener('mouseup', () => on_mouse_up());
canvas.addEventListener('mouseleave', () => {
    on_mouse_up();
    tileTip.style.opacity = '0';
});
canvas.addEventListener('wheel', (e) => {
    if (showMenu) return;
    e.preventDefault();
    on_wheel(e.deltaY);
}, { passive: false });

// Touch support
let lastTouchDist = 0, touchActive = false;
canvas.addEventListener('touchstart', (e) => {
    if (showMenu) return;
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    if (e.touches.length === 1) {
        touchActive = true;
        on_mouse_down(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top);
    } else if (e.touches.length === 2) {
        touchActive = false;
        lastTouchDist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
        );
    }
}, { passive: false });
canvas.addEventListener('touchmove', (e) => {
    if (showMenu) return;
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    if (e.touches.length === 1 && touchActive) {
        on_mouse_move(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top);
    } else if (e.touches.length === 2) {
        const dist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
        );
        if (lastTouchDist > 0) {
            on_wheel(dist < lastTouchDist ? 5 : -5);
        }
        lastTouchDist = dist;
    }
}, { passive: false });
canvas.addEventListener('touchend', () => { on_mouse_up(); touchActive = false; });

minimapEl.addEventListener('click', (e) => {
    // Simple click-to-recenter (engine handles via on_mouse_down at world pos)
    const rect = minimapEl.getBoundingClientRect();
    // Map click to center of minimap click area
    const mx = (e.clientX - rect.left) / 150;
    const my = (e.clientY - rect.top) / 150;
    // This is a simplified jump — engine would need a 'warp to' function
});

// ── Minimap render ─────────────────────────────────────────────────────
function renderMinimap() {
    if (!engineReady) return;
    const mapData = get_map_data();
    if (!mapData || mapData.length < 4) return;

    const w = mapData[0] | (mapData[1] << 8);
    const h = mapData[2] | (mapData[3] << 8);
    const tileData = mapData.slice(4);

    minimapEl.width = w;
    minimapEl.height = h;

    const imgData = mctx.createImageData(w, h);
    for (let i = 0; i < tileData.length; i++) {
        const terrain = tileData[i] & 0x07;
        const hex = TERRAIN_COLORS[terrain] || '#000';
        imgData.data[i * 4] = parseInt(hex.slice(1,3), 16);
        imgData.data[i * 4 + 1] = parseInt(hex.slice(3,5), 16);
        imgData.data[i * 4 + 2] = parseInt(hex.slice(5,7), 16);
        imgData.data[i * 4 + 3] = 255;
    }
    mctx.putImageData(imgData, 0, 0);

    // Scale up display
    minimapEl.style.width = '150px';
    minimapEl.style.height = '150px';
}

// ── Settings ────────────────────────────────────────────────────────────
const SETTINGS_KEY = 's4wn-settings';
const SETTINGS_DEFAULTS = {
    zoomSpeed: 1.0,
    terrainDetail: 1,   // 0=Low, 1=Med, 2=High
    masterVolume: 80,
    musicOn: true,
    sfxOn: true,
};

let settings = {};

function loadSettings() {
    try {
        const raw = localStorage.getItem(SETTINGS_KEY);
        settings = raw ? {...SETTINGS_DEFAULTS, ...JSON.parse(raw)} : {...SETTINGS_DEFAULTS};
    } catch {
        settings = {...SETTINGS_DEFAULTS};
    }
    syncSettingsToUI();
}

function saveSettings() {
    // Read from UI
    settings.zoomSpeed = parseFloat(document.getElementById('set-zoom').value);
    settings.terrainDetail = parseInt(document.getElementById('set-detail').value);
    settings.masterVolume = parseInt(document.getElementById('set-master-vol').value);
    settings.musicOn = document.getElementById('set-music').checked;
    settings.sfxOn = document.getElementById('set-sfx').checked;
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
}

function syncSettingsToUI() {
    document.getElementById('set-zoom').value = settings.zoomSpeed;
    document.getElementById('set-detail').value = settings.terrainDetail;
    document.getElementById('set-master-vol').value = settings.masterVolume;
    document.getElementById('set-music').checked = settings.musicOn;
    document.getElementById('set-sfx').checked = settings.sfxOn;
    updateAllSettingVals();
}

function updateSettingVal(id) {
    const el = document.getElementById(id);
    const valEl = document.getElementById('val-' + id);
    if (!valEl) return;
    switch (id) {
        case 'set-zoom':
            valEl.textContent = parseFloat(el.value).toFixed(1);
            break;
        case 'set-detail':
            valEl.textContent = ['Low', 'Med', 'High'][parseInt(el.value)] || 'Med';
            break;
        case 'set-master-vol':
            valEl.textContent = el.value + '%';
            break;
    }
    saveSettings();
}

function updateAllSettingVals() {
    ['set-zoom', 'set-detail', 'set-master-vol'].forEach(updateSettingVal);
}

function openSettings() {
    document.getElementById('settings-panel').classList.add('open');
    document.getElementById('settings-backdrop').classList.add('active');
}

function closeSettings() {
    document.getElementById('settings-panel').classList.remove('open');
    document.getElementById('settings-backdrop').classList.remove('active');
}

function resetSettings() {
    settings = {...SETTINGS_DEFAULTS};
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
    syncSettingsToUI();
}

// ── Resource Bar ──────────────────────────────────────────────────────────
const RESOURCE_ICONS = {
    Wood: '🪵', Stone: '🪨', Iron: '⛏️', Coal: '⬛',
    Gold: '🪙', Sulfur: '🟡', Fish: '🐟', Game: '🍖',
    Grain: '🌾', Planks: '📋', Tools: '🔧', Weapons: '⚔️',
};
const RESOURCE_ORDER = ['Wood','Stone','Iron','Coal','Gold','Grain','Fish','Game','Sulfur'];

let lastResourceUpdate = 0;
function updateResourceBar() {
    if (!engineReady) return;
    const now = performance.now();
    if (now - lastResourceUpdate < 2000) return; // Update every 2s
    lastResourceUpdate = now;

    try {
        const raw = get_resource_counts();
        if (!raw) { lastResourceUpdate = 0; return; }
        const counts = JSON.parse(raw);
        let html = '';
        RESOURCE_ORDER.forEach(name => {
            const count = counts[name];
            if (count === undefined) return;
            const icon = RESOURCE_ICONS[name] || '📦';
            html += `<div class="res-item" title="${name}: ${count}"><span class="res-icon">${icon}</span><span class="res-count">${count}</span></div>`;
        });
        document.getElementById('resource-bar').innerHTML = html || '<span class="res-placeholder">No resources</span>';
        document.getElementById('resource-bar').classList.add('visible');
    } catch(e) {
        // Engine not initialized yet — silently skip
    }
}

// ── Building / Unit Population ───────────────────────────────────────────
let lastPopUpdate = 0;
function updatePopulationSummary() {
    if (!engineReady) return;
    const now = performance.now();
    if (now - lastPopUpdate < 2000) return;
    lastPopUpdate = now;

    try {
        const bRaw = get_building_summary();
        const uRaw = get_unit_summary();
        if (!bRaw || !uRaw) { lastPopUpdate = 0; return; }
        const buildings = JSON.parse(bRaw);
        const units = JSON.parse(uRaw);

        const completeBldgs = buildings.filter(b => b.complete).length;
        const constructingBldgs = buildings.length - completeBldgs;
        const workers = units.filter(u => u.kind === 'Worker').length;
        const soldiers = units.filter(u => u.kind === 'Soldier').length;
        const archers = units.filter(u => u.kind === 'Archer').length;
        const military = soldiers + archers;

        let parts = [`🏠 ${completeBldgs}`];
        if (constructingBldgs > 0) parts.push(`🚧 ${constructingBldgs}`);
        parts.push(`👷 ${workers}`);
        if (military > 0) parts.push(`⚔️ ${military}`);
        hudPop.textContent = parts.join(' · ');
    } catch(e) {
        // Silently skip if not yet available
    }
}

// ── Game time ──────────────────────────────────────────────────────────────
function formatGameTime(seconds) {
    const s = Math.floor(seconds);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

// ── New Game ───────────────────────────────────────────────────────────────
function openNewGame() {
    document.getElementById('new-game-panel').classList.add('open');
}

function closeNewGame() {
    document.getElementById('new-game-panel').classList.remove('open');
}

function showLoading(msg) {
    const ls = document.getElementById('loading-screen');
    ls.querySelector('.loading-text').textContent = msg;
    ls.querySelector('.loading-bar-fill').style.width = '0%';
    ls.classList.add('active');
}

function updateLoadingProgress(pct, msg) {
    const ls = document.getElementById('loading-screen');
    ls.querySelector('.loading-bar-fill').style.width = Math.min(100, pct) + '%';
    if (msg) ls.querySelector('.loading-text').textContent = msg;
}

function hideLoading() {
    document.getElementById('loading-screen').classList.remove('active');
}

async function startNewGame() {
    const name = document.getElementById('ng-name').value || 'Player 1';
    const mapType = document.getElementById('ng-map').value;
    const difficulty = document.getElementById('ng-difficulty').value;
    console.log(`New Game: ${name}, map=${mapType}, difficulty=${difficulty}`);
    closeNewGame();
    closeMenu();

    if (!engineReady || !load_map_json) {
        alert('Engine not ready. Please wait for WASM to load.');
        return;
    }

    // Show loading screen
    showLoading('Generating world...');

    try {
        // Animate progress as async steps complete
        updateLoadingProgress(20, 'Generating terrain...');

        // Generate the map (64×64 default, use smaller map for easier difficulty)
        const mapSize = difficulty === 'easy' ? 48 : 64;
        const mapJson = generate_map(mapType, mapSize, mapSize);

        updateLoadingProgress(60, 'Building landscape...');

        // Load the map into the engine
        const result = load_map_json(mapJson);
        if (result !== 'ok') {
            throw new Error('Map load failed: ' + result);
        }

        updateLoadingProgress(80, 'Preparing starting resources...');

        // Apply starting resources based on difficulty
        const resResult = add_starting_resources(difficulty);
        if (resResult !== 'ok') {
            console.warn('Starting resources warning:', resResult);
        }

        // Set up starter base: HQ at center + idle workers
        const workerCount = difficulty === 'easy' ? 4 : (difficulty === 'hard' ? 2 : 3);
        const baseResult = JSON.parse(setup_starter_base(workerCount));
        if (!baseResult.ok) {
            console.error('Starter base setup failed:', baseResult.error);
        } else {
            console.log(`HQ placed at (${baseResult.hq_x},${baseResult.hq_y}), ${baseResult.workers} workers`);
        }

        updateLoadingProgress(100, 'Ready!');

        // Update HUD
        const mapName = mapType.charAt(0).toUpperCase() + mapType.slice(1);
        hudMap.textContent = `Map: ${mapName} | Player: ${name} | ${difficulty}`;
        lastResourceUpdate = 0;
        lastPopUpdate = 0;

        // Short delay to show "Ready!" then close loading
        setTimeout(() => {
            hideLoading();
        }, 400);

    } catch (err) {
        console.error('New Game failed:', err);
        hideLoading();
        alert('Failed to start new game: ' + err.message);
    }
}

// ── Main ────────────────────────────────────────────────────────────────
async function main() {
    try {
        await init();

        // Dynamically import load_map_json to avoid cache-mismatch crashes
        try {
            const mod = await import('./pkg/s4wn_engine.js?v=10');
            load_map_json = mod.load_map_json || null;
        } catch (e) {
            console.warn('load_map_json not available (old WASM cache?) — map loading disabled');
        }

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const ok = engineInit('game-canvas');
        if (!ok) {
            document.body.innerHTML = '<div style="color:red;padding:40px;text-align:center">WebGL2 not available</div>';
            return;
        }

        engineReady = true;
        hudMap.textContent = 'S4WN Engine | 64×64 isometric map';
        loadSettings();
        populateBuildToolbar();

        // Animation loop
        let fpsFrames = 0, fpsTime = performance.now(), currentFps = 0;
        function loop(ts) {
            if (showMenu) {
                requestAnimationFrame(loop);
                return;
            }

            render(ts);

            // FPS
            fpsFrames++;
            if (ts - fpsTime >= 1000) {
                currentFps = fpsFrames;
                fpsFrames = 0;
                fpsTime = ts;
            }

            // Stats
            const s = get_stats();
            if (s) {
                const d = JSON.parse(s);
                fpsEl.textContent = currentFps + ' FPS';
                hudStats.textContent = `ticks: ${d.ticks} | ⏱ ${formatGameTime(d.game_time)} | 🔍 ${d.zoom}×`;
            }

            // Resource bar (throttled to every 2s internally)
            updateResourceBar();

            // Building/unit population summary
            updatePopulationSummary();

            // Building affordability in toolbar
            refreshBuildingAffordability();

            requestAnimationFrame(loop);
        }

        // Minimap update every 2 seconds
        setInterval(renderMinimap, 2000);
        setTimeout(renderMinimap, 500);

        requestAnimationFrame(loop);

    } catch (err) {
        document.body.innerHTML = `<div style="color:#e44;padding:40px;text-align:center">Error: ${err}</div>`;
        console.error(err);
    }
}

main();
</script>
