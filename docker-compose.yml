# S4WN — Siedler 4 Web-Native
# Docker Compose configuration (single-container mode)
#
# Usage:
#   docker compose up -d              # Start (HTTP on 8080, WS on same port /ws)
#   docker compose up -d --build      # Rebuild and start
#   docker compose down               # Stop
#
# Environment variables:
#   S4WN_PORT          — HTTP listen port (default: 8080)
#   S4WN_SERVER_ADDR   — Game server bind address (default: 0.0.0.0:8080)

services:
  s4wn:
    build:
      context: .
      dockerfile: Dockerfile
    image: s4wn:latest
    container_name: s4wn
    restart: unless-stopped

    ports:
      - "${S4WN_PORT:-8080}:80"

    environment:
      - S4WN_SERVER_ADDR=${S4WN_SERVER_ADDR:-0.0.0.0:8080}
      - RUST_LOG=${RUST_LOG:-info}

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/engine/index.html"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
