name: S4WN CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: TypeScript Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run UI tests
        run: |
          echo "UI tests are disabled."
          exit 0

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      - name: Upload baseline snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-baselines
          path: tests/ui/__snapshots__/
          retention-days: 7

      - name: Build frontend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: s4wn-frontend-dist
          path: dist/

  validate-assets:
    name: Validate game assets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Validate test maps
        run: python3 scripts/validate_test_maps.py assets/maps/test

      - name: Validate config
        run: python3 scripts/validate_config.py

  docker-amd64:
    name: Build amd64 → GHCR
    needs: [test, validate-assets]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta (SHA tag)
        id: meta-sha
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: type=raw,value=sha-${{ github.sha }}-amd64
      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.meta-sha.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-arm64:
    name: Build arm64 → GHCR
    needs: [test, validate-assets]
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta (SHA tag)
        id: meta-sha
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: type=raw,value=sha-${{ github.sha }}-arm64
      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta-sha.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-manifest:
    name: Merge → Multi-Arch Manifest
    needs: [docker-amd64, docker-arm64]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifest
        run: |
          IMG="ghcr.io/${{ github.repository }}"
          SHA_TAG="sha-${{ github.sha }}"

          docker buildx imagetools create \
            --tag "${IMG}:${SHA_TAG}" \
            "${IMG}:${SHA_TAG}-amd64" \
            "${IMG}:${SHA_TAG}-arm64"

          docker buildx imagetools create \
            --tag "${IMG}:latest" \
            "${IMG}:${SHA_TAG}-amd64" \
            "${IMG}:${SHA_TAG}-arm64"

          echo "✅ Multi-arch: ${IMG}:latest"