name: S4WN CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: TypeScript Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run UI tests
        run: |
          echo "SKIP UI tests for now."
          exit 0
          
          npm run build
          # Start preview server with explicit port & capture PID
          npm run preview > /tmp/preview.log 2>&1 &
          PREVIEW_PID=$!
          
          # Wait for server to be healthy
          max_attempts=90
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            if curl -sf http://127.0.0.1:8766/ > /dev/null 2>&1; then
              echo "✓ Preview server ready"
              break
            fi
            attempt=$((attempt + 1))
            sleep 1
          done
          
          if [ $attempt -eq $max_attempts ]; then
            echo "✗ Preview server failed to start"
            cat /tmp/preview.log
            kill $PREVIEW_PID 2>/dev/null || true
            exit 1
          fi
          
          # Run tests with explicit timeout
          #TODO: npm run test:ui || TEST_RESULT=$?
          
          # Cleanup
          kill $PREVIEW_PID 2>/dev/null || true
          wait $PREVIEW_PID 2>/dev/null || true
          
          exit ${TEST_RESULT:-0}

      - name: Build frontend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: s4wn-frontend-dist
          path: dist/

  validate-assets:
    name: Validate game assets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Validate test maps
        run: python3 scripts/validate_test_maps.py assets/maps/test

      - name: Validate config
        run: python3 scripts/validate_config.py

  docker-amd64:
    name: Build amd64 → GHCR
    needs: [test, validate-assets]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta (SHA tag)
        id: meta-sha
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: type=raw,value=sha-${{ github.sha }}-amd64
      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.meta-sha.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-arm64:
    name: Build arm64 → GHCR
    needs: [test, validate-assets]
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta (SHA tag)
        id: meta-sha
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: type=raw,value=sha-${{ github.sha }}-arm64
      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta-sha.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-manifest:
    name: Merge → Multi-Arch Manifest
    needs: [docker-amd64, docker-arm64]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifest (latest + sha)
        run: |
          IMG="ghcr.io/${{ github.repository }}"
          SHA_TAG="sha-${{ github.sha }}"
          
          # Create multi-arch SHA manifest
          docker manifest create "${IMG}:${SHA_TAG}" \
            --amend "${IMG}:${SHA_TAG}-amd64" \
            --amend "${IMG}:${SHA_TAG}-arm64"
          docker manifest push "${IMG}:${SHA_TAG}"
          
          # Create multi-arch latest manifest
          docker manifest create "${IMG}:latest" \
            --amend "${IMG}:${SHA_TAG}-amd64" \
            --amend "${IMG}:${SHA_TAG}-arm64"
          docker manifest push "${IMG}:latest"
          
          echo "✅ Multi-arch manifest published: ${IMG}:latest"