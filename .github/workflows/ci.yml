name: S4WN CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: TypeScript Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run UI tests
        run: |
          echo "SKIP UI tests for now."
          exit 0
          
          npm run build
          # Start preview server with explicit port & capture PID
          npm run preview > /tmp/preview.log 2>&1 &
          PREVIEW_PID=$!
          
          # Wait for server to be healthy
          max_attempts=90
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            if curl -sf http://127.0.0.1:8766/ > /dev/null 2>&1; then
              echo "✓ Preview server ready"
              break
            fi
            attempt=$((attempt + 1))
            sleep 1
          done
          
          if [ $attempt -eq $max_attempts ]; then
            echo "✗ Preview server failed to start"
            cat /tmp/preview.log
            kill $PREVIEW_PID 2>/dev/null || true
            exit 1
          fi
          
          # Run tests with explicit timeout
          #TODO: npm run test:ui || TEST_RESULT=$?
          
          # Cleanup
          kill $PREVIEW_PID 2>/dev/null || true
          wait $PREVIEW_PID 2>/dev/null || true
          
          exit ${TEST_RESULT:-0}

      - name: Build frontend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: s4wn-frontend-dist
          path: dist/

  validate-assets:
    name: Validate game assets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Validate test maps
        run: python3 scripts/validate_test_maps.py assets/maps/test

      - name: Validate config
        run: python3 scripts/validate_config.py

  docker:
    name: Docker Multi-Arch Image → GHCR
    needs: [test, validate-assets]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max