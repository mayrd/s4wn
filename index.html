<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S4WN - Wildering New-Dawn</title>
  <link rel="icon" type="image/png" sizes="256x256" href="/assets/images/favicon-256.png" />
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #87CEEB;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #game-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #renderCanvas {
      width: 100%;
      height: 100%;
      display: block;
      outline: none;
    }
    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    .ui-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      pointer-events: auto;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.7);
    }
    .splash-screen {
      background-image: url('/assets/images/splash.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: white;
      text-align: center;
    }
    .main-menu-screen {
      background-color: #1a0a2e;
      background-image: url('/assets/images/splash.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    .splash-logo {
      font-size: 4rem;
      font-weight: bold;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
      margin-bottom: 2rem;
    }
    .splash-loading {
      font-size: 1.2rem;
      opacity: 0.7;
    }
    .main-menu-container {
      background: #5d4037;
      border: 10px solid #8d6e63;
      border-radius: 15px;
      padding: 40px;
      width: 400px;
      box-shadow: 0 0 50px rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .menu-title {
      font-size: 2.5rem;
      color: #f4e4bc;
      text-align: center;
      margin-bottom: 20px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      font-family: 'Georgia', serif;
    }
    .menu-button {
      background: #f4e4bc;
      border: 3px solid #5d4037;
      padding: 15px 25px;
      font-size: 1.2rem;
      font-weight: bold;
      color: #3e2723;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
      border-radius: 5px;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    }
    .menu-button.secondary {
      font-size: 1rem;
      padding: 10px 20px;
      background: #8d6e63;
      color: white;
    }
    .ui-screen.active {
      display: flex;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="renderCanvas"></canvas>
    <div id="ui-overlay"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
