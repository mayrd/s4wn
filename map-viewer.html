<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>S4WN — Siedler 4 Web-Native</title>
<link rel="icon" type="image/svg+xml" href="assets/ui/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="assets/ui/favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/ui/apple-touch-icon.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes glow {
    0%, 100% { text-shadow: 0 0 20px rgba(255,200,80,0.3), 0 0 60px rgba(255,180,40,0.1); }
    50%      { text-shadow: 0 0 30px rgba(255,200,80,0.5), 0 0 80px rgba(255,180,40,0.2); }
  }
  @keyframes fadeOut {
    from { opacity: 1; }
    to   { opacity: 0; pointer-events: none; }
  }

  body {
    background: #080c18;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #e0d8c8;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── Canvas ────────────────────────────────────────────────────────────── */
  #canvas {
    display: block;
    cursor: grab;
    position: fixed;
    top: 0; left: 0;
    z-index: 1;
  }
  #canvas:active { cursor: grabbing; }

  /* ── Splash Screen ─────────────────────────────────────────────────────── */
  #splash {
    position: fixed; inset: 0;
    z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #0f1528 0%, #060a14 100%);
    transition: opacity 0.8s ease-out;
  }
  #splash.hidden {
    opacity: 0;
    pointer-events: none;
  }
  #splash .title {
    font-size: clamp(48px, 10vw, 96px);
    font-weight: 300;
    letter-spacing: 0.15em;
    color: #e8c860;
    animation: glow 3s ease-in-out infinite;
  }
  #splash .subtitle {
    font-size: clamp(14px, 3vw, 22px);
    color: #8a8578;
    letter-spacing: 0.2em;
    margin-top: 8px;
    animation: fadeIn 1s ease-out 0.5s both;
  }
  #splash .version {
    position: absolute;
    bottom: 24px;
    color: #4a4558;
    font-size: 12px;
    letter-spacing: 0.1em;
  }

  /* ── Menu Overlay ──────────────────────────────────────────────────────── */
  #menu {
    position: fixed; inset: 0;
    z-index: 90;
    display: none;
    align-items: center; justify-content: center;
    background: rgba(6,10,20,0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: opacity 0.4s;
  }
  #menu.active {
    display: flex;
    animation: fadeIn 0.4s ease-out;
  }
  #menu.fading {
    opacity: 0;
  }
  .menu-card {
    background: linear-gradient(135deg, rgba(20,28,48,0.95), rgba(12,16,30,0.95));
    border: 1px solid rgba(200,170,100,0.15);
    border-radius: 16px;
    padding: 48px 40px;
    text-align: center;
    min-width: 340px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .menu-card h2 {
    font-weight: 300;
    font-size: 28px;
    color: #c8b878;
    letter-spacing: 0.1em;
    margin-bottom: 28px;
  }
  .menu-btn {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 14px 24px;
    font-size: 15px;
    font-family: inherit;
    letter-spacing: 0.06em;
    background: rgba(200,170,100,0.08);
    border: 1px solid rgba(200,170,100,0.2);
    border-radius: 8px;
    color: #d8c890;
    cursor: pointer;
    transition: all 0.2s;
  }
  .menu-btn:hover {
    background: rgba(200,170,100,0.18);
    border-color: rgba(200,170,100,0.4);
    color: #f0dca0;
    transform: translateY(-1px);
  }
  .menu-btn.secondary {
    background: rgba(255,255,255,0.03);
    border-color: rgba(255,255,255,0.08);
    color: #888;
    font-size: 13px;
  }
  .menu-btn.secondary:hover {
    background: rgba(255,255,255,0.08);
    color: #aaa;
  }
  .menu-hint {
    font-size: 11px;
    color: #555;
    margin-top: 16px;
    letter-spacing: 0.05em;
  }

  /* ── HUD Overlays ──────────────────────────────────────────────────────── */
  #hud-top-left {
    position: fixed; top: 12px; left: 16px;
    z-index: 10;
    font-family: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(200,200,200,0.7);
    pointer-events: none;
    line-height: 1.6;
  }
  #hud-top-right {
    position: fixed; top: 12px; right: 16px;
    z-index: 10;
    font-family: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(200,200,200,0.6);
    pointer-events: none;
    text-align: right;
    line-height: 1.6;
  }
  #fps {
    color: #5a8;
    font-size: 13px;
    font-weight: 600;
  }

  /* ── Controls Bar ──────────────────────────────────────────────────────── */
  #controls {
    position: fixed; bottom: 16px; left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex; gap: 8px;
  }
  #controls button {
    padding: 8px 16px;
    font-size: 12px;
    font-family: inherit;
    letter-spacing: 0.04em;
    background: rgba(20,24,40,0.8);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    color: #bbb;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  #controls button:hover {
    background: rgba(30,36,56,0.9);
    border-color: rgba(255,255,255,0.2);
    color: #fff;
  }
  #controls button.accent {
    border-color: rgba(200,170,100,0.3);
    color: #c8b878;
  }

  /* ── Drop Zone ─────────────────────────────────────────────────────────── */
  #drop-zone {
    position: fixed; inset: 0;
    z-index: 50;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.6);
    pointer-events: none; opacity: 0;
    transition: opacity 0.2s;
  }
  #drop-zone.visible { opacity: 1; }
  #drop-zone .msg {
    background: rgba(20,28,48,0.95);
    border: 2px dashed rgba(200,170,100,0.4);
    border-radius: 16px;
    padding: 40px 60px;
    font-size: 18px;
    color: #c8b878;
    letter-spacing: 0.06em;
  }

  /* ── File Input (hidden) ───────────────────────────────────────────────── */
  #fileInput { display: none; }

  /* ── Settings Panel ─────────────────────────────────────────────────────── */
  #settings-panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 320px; max-width: 90vw; z-index: 95;
    background: linear-gradient(180deg, #0c1225 0%, #080e1c 100%);
    border-left: 1px solid rgba(200,170,100,0.12);
    box-shadow: -8px 0 32px rgba(0,0,0,0.5);
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    padding: 28px 24px;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 20px;
  }
  #settings-panel.open { transform: translateX(0); }
  .settings-backdrop {
    position: fixed; inset: 0; z-index: 94;
    background: rgba(0,0,0,0.4);
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s;
  }
  .settings-backdrop.active { opacity: 1; pointer-events: auto; }
  .settings-header {
    display: flex; justify-content: space-between; align-items: center;
  }
  .settings-header h3 {
    font-weight: 300; font-size: 20px;
    color: #c8b878; letter-spacing: 0.08em;
  }
  .settings-close {
    background: none; border: 1px solid rgba(255,255,255,0.1);
    color: #888; font-size: 18px; width: 32px; height: 32px;
    border-radius: 6px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .settings-close:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .settings-section {
    border-top: 1px solid rgba(255,255,255,0.06);
    padding-top: 16px;
  }
  .settings-section h4 {
    font-size: 11px; font-weight: 500;
    color: #666; text-transform: uppercase;
    letter-spacing: 0.15em; margin-bottom: 12px;
  }
  .setting-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px; font-size: 13px; color: #bbb;
  }
  .setting-row label { flex-shrink: 0; margin-right: 12px; }
  .setting-row input[type=range] {
    flex: 1; height: 4px;
    accent-color: #c8b878;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
  }
  .setting-row .setting-val {
    font-size: 11px; color: #888;
    min-width: 36px; text-align: right;
  }
  .setting-row input[type=checkbox] {
    accent-color: #c8b878; width: 16px; height: 16px;
  }
  .settings-actions {
    display: flex; gap: 8px; margin-top: auto; padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .settings-actions button {
    flex: 1; padding: 10px; font-size: 12px;
    font-family: inherit; letter-spacing: 0.05em;
    border-radius: 6px; cursor: pointer;
    transition: all 0.2s;
  }
  .btn-reset {
    background: rgba(255,80,80,0.08);
    border: 1px solid rgba(255,80,80,0.15);
    color: #c66;
  }
  .btn-reset:hover { background: rgba(255,80,80,0.18); color: #e88; }
  .btn-back {
    background: rgba(200,170,100,0.08);
    border: 1px solid rgba(200,170,100,0.2);
    color: #c8b878;
  }
  .btn-back:hover { background: rgba(200,170,100,0.18); color: #f0dca0; }

  /* ── Minimap ───────────────────────────────────────────────────────────── */
  #minimap {
    position: fixed; bottom: 60px; right: 12px;
    z-index: 10;
    width: 120px; height: 120px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px;
    background: rgba(0,0,0,0.5);
    cursor: pointer;
    transition: opacity 0.3s;
  }
</style>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// S4WN Map Viewer — fullscreen isometric renderer
// ═══════════════════════════════════════════════════════════════════════════

// ── Terrain Definitions ──────────────────────────────────────────────────
const TERRAIN_BY_ID = [
  { name: 'Grass',      colors: ['#4a8c3f','#3d7235','#569a4a'], buildable: true,  speed: 1.0 },
  { name: 'Forest',     colors: ['#2d5a1e','#234818','#356a24'], buildable: true,  speed: 0.6 },
  { name: 'Mountain',   colors: ['#6b6b6b','#585858','#808080'], buildable: false, speed: 0.0 },
  { name: 'Water',      colors: ['#2a5a8c','#1e4570','#3570a8'], buildable: false, speed: 0.0 },
  { name: 'DeepWater',  colors: ['#153060','#0f2248','#1b3870'], buildable: false, speed: 0.0 },
  { name: 'Desert',     colors: ['#d4b870','#c0a460','#e0c880'], buildable: true,  speed: 0.8 },
  { name: 'Swamp',      colors: ['#3d5028','#2e4020','#486030'], buildable: false, speed: 0.4 },
  { name: 'Snow',       colors: ['#d8dce0','#c4c8cc','#e8ecf0'], buildable: false, speed: 0.7 },
];

const TERRAIN_BY_NAME = {};
TERRAIN_BY_ID.forEach((t, i) => { TERRAIN_BY_NAME[t.name] = { ...t, id: i }; });

const RESOURCE_COLORS = {
  Iron:    '#b85a4a',
  Coal:    '#3a3a3a',
  Gold:    '#e8c840',
  Stone:   '#9a968a',
  Sulfur:  '#e0d840',
  Fish:    '#5a9ac0',
  Game:    '#b87840',
  Grain:   '#c8b840',
};

// ── State ─────────────────────────────────────────────────────────────────
let map = null;           // { width, height, tiles: [{terrain, elevation, resource}] }
let mapName = '';
let camera = { cx: 0, cy: 0, zoom: 1, targetZoom: 1 };
let dragging = false, dragStart = { x:0, y:0 }, camStart = { cx:0, cy:0 };
let fpsHistory = [], lastFrameTime = performance.now();
let showMenu = false;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const minimap = document.getElementById('minimap');
const mctx = minimap.getContext('2d');

// ── Splash → Menu Flow ───────────────────────────────────────────────────
function initApp() {
  loadSettings();
  resizeCanvas();

  // Show splash for 2.5s then fade to menu
  setTimeout(() => {
    document.getElementById('splash').classList.add('hidden');
    setTimeout(() => {
      openMenu();
    }, 800); // wait for fade-out
  }, 2500);

  requestAnimationFrame(gameLoop);
}

function openMenu() {
  showMenu = true;
  document.getElementById('menu').classList.add('active');
  document.getElementById('menu').classList.remove('fading');
}

function closeMenu() {
  document.getElementById('menu').classList.add('fading');
  setTimeout(() => {
    document.getElementById('menu').classList.remove('active', 'fading');
  }, 400);
  showMenu = false;
}

// ── Map Loading ──────────────────────────────────────────────────────────
function triggerLoad() {
  document.getElementById('fileInput').click();
}

function loadFile(event) {
  const file = event.target.files[0];
  if (file) loadFileFromFile(file);
  event.target.value = ''; // reset so same file can be re-loaded
}

function loadFileFromFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  mapName = file.name.replace(/\.(json|map)$/i, '');
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      let data;
      if (ext === 'map') {
        data = parseBinaryMap(e.target.result);
      } else {
        data = JSON.parse(e.target.result);
      }
      loadMapData(data);
      closeMenu();
    } catch (err) {
      alert('Failed to load map: ' + err.message);
    }
  };
  if (ext === 'map') {
    reader.readAsArrayBuffer(file);
  } else {
    reader.readAsText(file);
  }
}

function parseBinaryMap(buffer) {
  // Original S4 .map binary format — attempt to decode
  // Header: magic "WRLD" + version + width/height
  const view = new DataView(buffer);
  let offset = 0;

  // Check for text/json content (some .map files are actually JSON)
  const decoder = new TextDecoder();
  const text = decoder.decode(new Uint8Array(buffer).slice(0, 200));
  if (text.trim().startsWith('{')) {
    return JSON.parse(decoder.decode(buffer));
  }

  // Try S4 binary format: 4-byte magic, 4-byte version, 4-byte width, 4-byte height
  if (buffer.byteLength < 16) throw new Error('File too small for .map format');
  const magic = String.fromCharCode(...new Uint8Array(buffer, 0, 4));
  if (magic !== 'WRLD') {
    throw new Error(`Unknown .map format (magic: ${magic}). Try a .json map file instead.`);
  }

  const version = view.getUint32(4, true);
  const width = view.getUint32(8, true);
  const height = view.getUint32(12, true);

  if (width < 1 || width > 1024 || height < 1 || height > 1024) {
    throw new Error(`Invalid map dimensions: ${width}×${height}`);
  }

  const tiles = [];
  offset = 16;

  for (let i = 0; i < width * height; i++) {
    if (offset + 6 > buffer.byteLength) break;
    const terrainId = view.getUint8(offset);
    const elevRaw = view.getUint8(offset + 1);
    const flags = view.getUint8(offset + 2);
    const resourceId = view.getUint8(offset + 3);
    const microX = view.getUint8(offset + 4);
    const microY = view.getUint8(offset + 5);
    offset += 6;

    const terrain = TERRAIN_BY_ID[terrainId]?.name || 'Grass';
    const elevation = (elevRaw / 255) * 2 - 1; // normalize to -1..1

    let resource = null;
    const resMap = [null, 'Iron', 'Coal', 'Gold', 'Stone', 'Sulfur', 'Fish', 'Game', 'Grain'];
    if (resourceId > 0 && resourceId < resMap.length) {
      resource = resMap[resourceId];
    }

    tiles.push({ terrain, elevation, resource });
  }

  return { width, height, tiles };
}

function loadMapData(data) {
  // Normalize both Rust format ({t,e,r}) and verbose format ({terrain,elevation,resource})
  if (!data.tiles || !data.width || !data.height) {
    throw new Error('Map must have width, height, and tiles array');
  }

  const normalized = [];
  for (const tile of data.tiles) {
    let terrain, elevation, resource;

    if (tile.terrain !== undefined) {
      // Verbose format
      terrain = tile.terrain;
      elevation = tile.elevation ?? 0;
      resource = tile.resource ?? null;
    } else if (tile.t !== undefined) {
      // Rust format: {t: terrain_id, e: elevation, r: resource_name}
      terrain = TERRAIN_BY_ID[tile.t]?.name || 'Grass';
      elevation = tile.e ?? 0;
      resource = tile.r ?? null;
    } else {
      throw new Error('Unknown tile format');
    }

    // Validate terrain name
    if (!TERRAIN_BY_NAME[terrain]) {
      terrain = 'Grass'; // fallback
    }

    normalized.push({ terrain, elevation, resource });
  }

  map = { width: data.width, height: data.height, tiles: normalized };
  mapName = mapName || `${data.width}×${data.height} map`;

  // Center camera on map
  camera.cx = map.width / 2;
  camera.cy = map.height / 2;
  camera.zoom = Math.min(
    canvas.width / (map.width * 30),
    canvas.height / (map.height * 20),
    1.5
  );
  camera.targetZoom = camera.zoom;

  updateHUD();
}

function startDemo() {
  map = generateDemoMap();
  mapName = 'Demo Map';
  camera.cx = map.width / 2;
  camera.cy = map.height / 2;
  camera.zoom = 1;
  camera.targetZoom = 1;
  closeMenu();
  updateHUD();
}

// ── Demo Map Generator ────────────────────────────────────────────────────
function generateDemoMap() {
  const w = 64, h = 64;
  const tiles = [];

  // Simple fbm-like noise
  function noise(x, y) {
    const n = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
    return n - Math.floor(n);
  }
  function fbm(x, y, octaves=3) {
    let v = 0, amp = 0.5, freq = 1, max = 0;
    for (let i = 0; i < octaves; i++) {
      v += noise(x * freq, y * freq) * amp;
      max += amp;
      amp *= 0.5; freq *= 2;
    }
    return v / max;
  }

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const nx = x / w, ny = y / h;
      const elev = fbm(nx * 4, ny * 4, 4) * 2 - 1;
      let terrain, resource = null;

      if (elev < -0.3) terrain = 'DeepWater';
      else if (elev < 0.0) terrain = 'Water';
      else if (elev < 0.15) terrain = noise(nx*8, ny*8) > 0.4 ? 'Desert' : 'Grass';
      else if (elev < 0.5) terrain = noise(nx*10, ny*10) > 0.55 ? 'Forest' : 'Grass';
      else if (elev < 0.7) terrain = 'Mountain';
      else terrain = 'Snow';

      // Water border
      if (x < 3 || x >= w-3 || y < 3 || y >= h-3) terrain = 'Water';

      // Resources (~10% of tiles)
      const rng = noise(nx * 13.7, ny * 13.7);
      if (rng > 0.35 && rng < 0.47) {
        const resByTerrain = {
          Grass:    rng > 0.43 ? 'Grain' : rng > 0.40 ? 'Stone' : 'Coal',
          Forest:   rng > 0.43 ? 'Game' : 'Iron',
          Mountain: rng > 0.43 ? 'Gold' : rng > 0.40 ? 'Stone' : 'Iron',
          Desert:   'Sulfur',
          Swamp:    'Coal',
          Snow:     'Stone',
        };
        resource = resByTerrain[terrain] || null;
      }

      tiles.push({ terrain, elevation: elev, resource });
    }
  }
  return { width: w, height: h, tiles };
}

// ── Rendering ─────────────────────────────────────────────────────────────
function tileAt(x, y) {
  if (!map || x < 0 || x >= map.width || y < 0 || y >= map.height) return null;
  return map.tiles[y * map.width + x];
}

function worldToScreen(wx, wy) {
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const dx = wx - camera.cx, dy = wy - camera.cy;
  const sx = cx + (dx - dy) * 0.866 * camera.zoom;
  const sy = cy + (dx + dy) * 0.5 * camera.zoom;
  return [sx, sy];
}

function screenToWorld(sx, sy) {
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const dx = (sx - cx) / camera.zoom;
  const dy = (sy - cy) / camera.zoom;
  const wx = dx / 1.732 + dy;
  const wy = -dx / 1.732 + dy;
  return [wx + camera.cx, wy + camera.cy];
}

function renderMap() {
  if (!map) {
    // Draw placeholder
    ctx.fillStyle = '#080c18';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'rgba(200,200,200,0.1)';
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Press ☰ Menu to load a map', canvas.width/2, canvas.height/2);
    return;
  }

  // Smooth zoom
  camera.zoom += (camera.targetZoom - camera.zoom) * 0.15;

  ctx.fillStyle = '#080c18';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Visible tile range
  const extra = 3;
  const topLeft = screenToWorld(0, 0);
  const bottomRight = screenToWorld(canvas.width, canvas.height);
  const minX = Math.max(0, Math.floor(Math.min(topLeft[0], bottomRight[0])) - extra);
  const maxX = Math.min(map.width - 1, Math.ceil(Math.max(topLeft[0], bottomRight[0])) + extra);
  const minY = Math.max(0, Math.floor(Math.min(topLeft[1], bottomRight[1])) - extra);
  const maxY = Math.min(map.height - 1, Math.ceil(Math.max(topLeft[1], bottomRight[1])) + extra);

  // Collect & sort (painter's algorithm: back to front)
  const toRender = [];
  for (let y = minY; y <= maxY; y++) {
    for (let x = minX; x <= maxX; x++) {
      toRender.push({ x, y });
    }
  }
  toRender.sort((a, b) => (a.x + a.y) - (b.x + b.y));

  const tileSize = 16 * camera.zoom;

  for (const { x, y } of toRender) {
    const tile = tileAt(x, y);
    if (!tile) continue;

    const terrainData = TERRAIN_BY_NAME[tile.terrain] || TERRAIN_BY_NAME['Grass'];
    const [sx, sy] = worldToScreen(x, y);
    const elev = tile.elevation || 0;
    const half = tileSize / 2 * 0.866;
    const vert = tileSize / 2 * 0.5;
    const eOffset = elev * tileSize * 0.35;

    // Diamond path
    ctx.beginPath();
    ctx.moveTo(sx, sy - vert - eOffset);
    ctx.lineTo(sx + half, sy - eOffset);
    ctx.lineTo(sx, sy + vert - eOffset);
    ctx.lineTo(sx - half, sy - eOffset);
    ctx.closePath();

    // Fill with elevation shading
    const shade = 1.0 - Math.max(0, elev) * 0.5;
    const col = terrainData.colors[0];
    const r = parseInt(col.slice(1,3), 16) * shade;
    const g = parseInt(col.slice(3,5), 16) * shade;
    const b = parseInt(col.slice(5,7), 16) * shade;
    ctx.fillStyle = `rgb(${Math.floor(r)},${Math.floor(g)},${Math.floor(b)})`;
    ctx.fill();

    // Outline
    ctx.strokeStyle = `rgba(0,0,0,${0.08 + Math.abs(elev) * 0.2})`;
    ctx.lineWidth = Math.max(0.3, 0.5 * camera.zoom);
    ctx.stroke();

    // Resource indicator
    if (tile.resource) {
      const resColor = RESOURCE_COLORS[tile.resource] || '#ffd700';
      ctx.fillStyle = resColor;
      ctx.beginPath();
      const rSize = tileSize * 0.07 * (1 + Math.sin(performance.now() / 1000) * 0.15);
      ctx.arc(sx, sy - eOffset - vert * 0.1, rSize, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }

  // Draw minimap
  drawMinimap();
}

function drawMinimap() {
  if (!map) {
    mctx.clearRect(0, 0, 120, 120);
    return;
  }
  const mw = 120, mh = 120;
  const sx = mw / map.width;
  const sy = mh / map.height;
  mctx.clearRect(0, 0, mw, mh);

  for (let y = 0; y < map.height; y++) {
    for (let x = 0; x < map.width; x++) {
      const tile = tileAt(x, y);
      if (!tile) continue;
      const td = TERRAIN_BY_NAME[tile.terrain] || TERRAIN_BY_NAME['Grass'];
      mctx.fillStyle = td.colors[0];
      mctx.fillRect(x * sx, y * sy, Math.ceil(sx), Math.ceil(sy));
    }
  }

  // Viewport rect
  const [vx1, vy1] = screenToWorld(0, 0);
  const [vx2, vy2] = screenToWorld(canvas.width, canvas.height);
  mctx.strokeStyle = '#fff';
  mctx.lineWidth = 1;
  mctx.strokeRect(
    Math.max(0, Math.min(vx1, vx2)) * sx,
    Math.max(0, Math.min(vy1, vy2)) * sy,
    Math.abs(vx2 - vx1) * sx,
    Math.abs(vy2 - vy1) * sy
  );
}

// ── FPS + HUD ─────────────────────────────────────────────────────────────
function updateHUD() {
  const info = document.getElementById('map-info');
  const fpsEl = document.getElementById('fps');
  const posEl = document.getElementById('pos-info');

  if (map) {
    info.textContent = `${mapName} | ${map.width}×${map.height} | zoom: ${camera.zoom.toFixed(1)}×`;
    posEl.textContent = `cam: (${camera.cx.toFixed(1)}, ${camera.cy.toFixed(1)})`;
  } else {
    info.textContent = 'No map loaded';
    posEl.textContent = '';
  }
  fpsEl.textContent = `${currentFPS} FPS`;
}

// ── Game Loop ─────────────────────────────────────────────────────────────
let currentFPS = 0;
let frameCount = 0;
let fpsTimer = performance.now();

function gameLoop(now) {
  frameCount++;

  // FPS calculation (update every second)
  if (now - fpsTimer >= 1000) {
    currentFPS = frameCount;
    frameCount = 0;
    fpsTimer = now;
    updateHUD();
  }

  renderMap();
  requestAnimationFrame(gameLoop);
}

// ── Event Handlers ────────────────────────────────────────────────────────
canvas.addEventListener('mousedown', (e) => {
  if (showMenu) return;
  dragging = true;
  dragStart = { x: e.clientX, y: e.clientY };
  camStart = { cx: camera.cx, cy: camera.cy };
});

canvas.addEventListener('mousemove', (e) => {
  if (!dragging || showMenu) return;
  const dx = e.clientX - dragStart.x;
  const dy = e.clientY - dragStart.y;
  camera.cx = camStart.cx - (dx / 0.866 - dy / 0.5) / camera.zoom * 0.008;
  camera.cy = camStart.cy - (dx / 0.866 + dy / 0.5) / camera.zoom * 0.008;
  camera.targetZoom = camera.zoom;
  updateHUD();
});

canvas.addEventListener('mouseup', () => { dragging = false; });
canvas.addEventListener('mouseleave', () => { dragging = false; });

canvas.addEventListener('wheel', (e) => {
  if (showMenu) return;
  e.preventDefault();
  camera.targetZoom *= e.deltaY < 0 ? 1.15 : 0.87;
  camera.targetZoom = Math.max(0.2, Math.min(10, camera.targetZoom));
});

// Touch support
let lastTouches = null;
canvas.addEventListener('touchstart', (e) => {
  if (showMenu) return;
  if (e.touches.length === 1) {
    dragging = true;
    dragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    camStart = { cx: camera.cx, cy: camera.cy };
  }
  lastTouches = [...e.touches];
});

canvas.addEventListener('touchmove', (e) => {
  if (showMenu) return;
  e.preventDefault();
  if (e.touches.length === 1 && dragging) {
    const dx = e.touches[0].clientX - dragStart.x;
    const dy = e.touches[0].clientY - dragStart.y;
    camera.cx = camStart.cx - (dx / 0.866 - dy / 0.5) / camera.zoom * 0.008;
    camera.cy = camStart.cy - (dx / 0.866 + dy / 0.5) / camera.zoom * 0.008;
    camera.targetZoom = camera.zoom;
  } else if (e.touches.length === 2 && lastTouches?.length === 2) {
    const dist = (a, b) => Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
    const prev = dist(lastTouches[0], lastTouches[1]);
    const curr = dist(e.touches[0], e.touches[1]);
    camera.targetZoom *= curr / prev;
    camera.targetZoom = Math.max(0.2, Math.min(10, camera.targetZoom));
  }
  lastTouches = [...e.touches];
  updateHUD();
});

canvas.addEventListener('touchend', () => { dragging = false; lastTouches = null; });

// Drop zone
document.addEventListener('dragover', (e) => {
  e.preventDefault();
  document.getElementById('drop-zone').classList.add('visible');
});
document.addEventListener('dragleave', (e) => {
  if (e.target === document.documentElement) {
    document.getElementById('drop-zone').classList.remove('visible');
  }
});
document.addEventListener('drop', (e) => {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('visible');
  const file = e.dataTransfer.files[0];
  if (file) loadFileFromFile(file);
});

// Minimap click to jump
minimap.addEventListener('click', (e) => {
  if (!map) return;
  const rect = minimap.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / 120 * map.width;
  const my = (e.clientY - rect.top) / 120 * map.height;
  camera.cx = mx;
  camera.cy = my;
  camera.targetZoom = camera.zoom;
  updateHUD();
});

// ── Settings ────────────────────────────────────────────────────────────────
const SETTINGS_KEY = 's4wn-settings';
const SETTINGS_DEFAULTS = {
    zoomSpeed: 1.0,
    terrainDetail: 1,
    masterVolume: 80,
    musicOn: true,
    sfxOn: true,
};

let settings = {};

function loadSettings() {
    try {
        const raw = localStorage.getItem(SETTINGS_KEY);
        settings = raw ? {...SETTINGS_DEFAULTS, ...JSON.parse(raw)} : {...SETTINGS_DEFAULTS};
    } catch {
        settings = {...SETTINGS_DEFAULTS};
    }
    syncSettingsToUI();
}

function saveSettings() {
    settings.zoomSpeed = parseFloat(document.getElementById('set-zoom').value);
    settings.terrainDetail = parseInt(document.getElementById('set-detail').value);
    settings.masterVolume = parseInt(document.getElementById('set-master-vol').value);
    settings.musicOn = document.getElementById('set-music').checked;
    settings.sfxOn = document.getElementById('set-sfx').checked;
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
}

function syncSettingsToUI() {
    document.getElementById('set-zoom').value = settings.zoomSpeed;
    document.getElementById('set-detail').value = settings.terrainDetail;
    document.getElementById('set-master-vol').value = settings.masterVolume;
    document.getElementById('set-music').checked = settings.musicOn;
    document.getElementById('set-sfx').checked = settings.sfxOn;
    updateAllSettingVals();
}

function updateSettingVal(id) {
    const el = document.getElementById(id);
    const valEl = document.getElementById('val-' + id);
    if (!valEl) return;
    switch (id) {
        case 'set-zoom':
            valEl.textContent = parseFloat(el.value).toFixed(1);
            break;
        case 'set-detail':
            valEl.textContent = ['Low', 'Med', 'High'][parseInt(el.value)] || 'Med';
            break;
        case 'set-master-vol':
            valEl.textContent = el.value + '%';
            break;
    }
    saveSettings();
}

function updateAllSettingVals() {
    ['set-zoom', 'set-detail', 'set-master-vol'].forEach(updateSettingVal);
}

function openSettings() {
    document.getElementById('settings-panel').classList.add('open');
    document.getElementById('settings-backdrop').classList.add('active');
}

function closeSettings() {
    document.getElementById('settings-panel').classList.remove('open');
    document.getElementById('settings-backdrop').classList.remove('active');
}

function resetSettings() {
    settings = {...SETTINGS_DEFAULTS};
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
    syncSettingsToUI();
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;

  switch (e.key.toLowerCase()) {
    case 'l':
      if (!showMenu) openMenu();
      triggerLoad();
      break;
    case 'd':
      if (showMenu) startDemo();
      break;
    case 's':
      openSettings();
      break;
    case 'm':
    case 'escape':
      if (document.getElementById('settings-panel').classList.contains('open')) {
        closeSettings();
      } else {
        if (showMenu) closeMenu();
        else openMenu();
      }
      break;
    case '+':
    case '=':
      if (!showMenu) { camera.targetZoom *= 1.2; camera.targetZoom = Math.min(10, camera.targetZoom); }
      break;
    case '-':
      if (!showMenu) { camera.targetZoom *= 0.8; camera.targetZoom = Math.max(0.2, camera.targetZoom); }
      break;
    case 'r':
      if (!showMenu) resetView();
      break;
    case '0':
      if (!showMenu) { camera.targetZoom = 1; }
      break;
  }
});

// ── Control functions ─────────────────────────────────────────────────────
function resetView() {
  if (!map) return;
  camera.cx = map.width / 2;
  camera.cy = map.height / 2;
  camera.targetZoom = 1;
  updateHUD();
}

function zoomIn() {
  if (!map) return;
  camera.targetZoom *= 1.3;
  camera.targetZoom = Math.min(10, camera.targetZoom);
}

function zoomOut() {
  if (!map) return;
  camera.targetZoom *= 0.77;
  camera.targetZoom = Math.max(0.2, camera.targetZoom);
}

// ── Resize ────────────────────────────────────────────────────────────────
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  // Keep camera centered
  if (map) {
    camera.targetZoom = camera.zoom;
  }
}

window.addEventListener('resize', resizeCanvas);

// ── Init ──────────────────────────────────────────────────────────────────
initApp();
</script>
