<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S4WN Map Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a1a; overflow: hidden; font-family: monospace; }
  canvas { display: block; cursor: grab; }
  canvas:active { cursor: grabbing; }
  #hud {
    position: fixed; top: 10px; left: 10px;
    background: rgba(0,0,0,0.7); color: #fff; padding: 8px 12px;
    border-radius: 4px; font-size: 12px; pointer-events: none;
    z-index: 2;
  }
  #drop-zone {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.5); color: #fff; font-size: 24px;
    z-index: 10; pointer-events: none; opacity: 0; transition: opacity 0.2s;
  }
  #drop-zone.visible { opacity: 1; }
  #controls {
    position: fixed; bottom: 10px; right: 10px;
    display: flex; gap: 4px; z-index: 2;
  }
  #controls button {
    background: rgba(255,255,255,0.15); color: #ccc; border: 1px solid rgba(255,255,255,0.2);
    padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px;
  }
  #controls button:hover { background: rgba(255,255,255,0.25); color: #fff; }
  input[type=file] { display: none; }
</style>
</head>
<body>
<div id="hud">
  Map Viewer — drag to pan, scroll to zoom
  <span id="info" style="opacity:0.6; margin-left:8px;"></span>
</div>
<div id="drop-zone">📂 Drop .map.json file here</div>
<div id="controls">
  <button onclick="document.getElementById('fileInput').click()">📁 Load</button>
  <button onclick="resetView()">🏠 Reset</button>
</div>
<input type="file" id="fileInput" accept=".json" onchange="loadFile(event)">

<canvas id="canvas"></canvas>

<script>
// ── Terrain color palette ─────────────────────────────────────────────────
const TERRAIN_COLORS = {
  Grass:      ['#4a8c3f', '#3d7235', '#569a4a'],
  Dirt:       ['#8b7355', '#7a6548', '#9c8262'],
  Sand:       ['#e8d5a3', '#d4c090', '#f0dfb5'],
  Water:      ['#2a5a8c', '#1e4570', '#3570a8'],
  ShallowWater:['#3a7aaa', '#2e6090', '#4890c0'],
  Mountain:   ['#6b6b6b', '#585858', '#808080'],
  Snow:       ['#e8e8e8', '#d0d0d0', '#f5f5f5'],
  Swamp:      ['#4a5a2a', '#3d4d22', '#566a32'],
};
const DEFAULT_COLOR = ['#444', '#333', '#555'];

// ── State ──────────────────────────────────────────────────────────────────
let map = null;       // Map data: { width, height, tiles: [{terrain, elevation, resource}] }
let camera = { cx: 0, cy: 0, zoom: 1 };
let dragging = false;
let dragStart = { x: 0, y: 0 };
let camStart = { cx: 0, cy: 0 };

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// ── Demo map (generated if no file loaded) ────────────────────────────────
function generateDemoMap() {
  const w = 64, h = 64;
  const terrains = Object.keys(TERRAIN_COLORS);
  const tiles = [];
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const centerDist = Math.sqrt((x-w/2)**2 + (y-h/2)**2) / (w/2);
      let terrain;
      if (centerDist < 0.15) terrain = 'Grass';
      else if (centerDist < 0.4) terrain = 'Dirt';
      else if (centerDist < 0.6) terrain = Math.random() > 0.6 ? 'Mountain' : 'Dirt';
      else if (centerDist < 0.8) terrain = Math.random() > 0.7 ? 'Water' : 'Sand';
      else terrain = 'Water';

      if (x < 3 || x >= w-3 || y < 3 || y >= h-3) terrain = 'Water';

      const elevation = terrain === 'Mountain' ? 0.6 + Math.random() * 0.4
        : terrain === 'Water' ? -0.3 : Math.random() * 0.2;
      tiles.push({ terrain, elevation, resource: null });
    }
  }
  return { width: w, height: h, tiles };
}

// ── Rendering ──────────────────────────────────────────────────────────────
function tileAt(x, y) {
  if (x < 0 || x >= map.width || y < 0 || y >= map.height) return null;
  return map.tiles[y * map.width + x];
}

function worldToScreen(wx, wy) {
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const dx = wx - camera.cx, dy = wy - camera.cy;
  const sx = cx + (dx - dy) * 0.866 * camera.zoom;
  const sy = cy + (dx + dy) * 0.5 * camera.zoom;
  return [sx, sy];
}

function screenToWorld(sx, sy) {
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const dx = (sx - cx) / camera.zoom;
  const dy = (sy - cy) / camera.zoom;
  const wx = dx / 1.732 + dy;
  const wy = -dx / 1.732 + dy;
  return [wx + camera.cx, wy + camera.cy];
}

function render() {
  if (!map) return;

  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Determine visible tile range
  const topLeft = screenToWorld(0, 0);
  const bottomRight = screenToWorld(canvas.width, canvas.height);
  const extra = 2;
  const minX = Math.max(0, Math.floor(Math.min(topLeft[0], bottomRight[0])) - extra);
  const maxX = Math.min(map.width - 1, Math.ceil(Math.max(topLeft[0], bottomRight[0])) + extra);
  const minY = Math.max(0, Math.floor(Math.min(topLeft[1], bottomRight[1])) - extra);
  const maxY = Math.min(map.height - 1, Math.ceil(Math.max(topLeft[1], bottomRight[1])) + extra);

  // Sort tiles by y+x for painter's algorithm (back to front)
  const toRender = [];
  for (let y = minY; y <= maxY; y++) {
    for (let x = minX; x <= maxX; x++) {
      toRender.push({ x, y });
    }
  }
  toRender.sort((a, b) => (a.x + a.y) - (b.x + b.y));

  const tileSize = 16 * camera.zoom;

  for (const { x, y } of toRender) {
    const tile = tileAt(x, y);
    if (!tile) continue;

    const [sx, sy] = worldToScreen(x, y);
    const colors = TERRAIN_COLORS[tile.terrain] || DEFAULT_COLOR;
    const elev = tile.elevation || 0;

    // Isometric diamond shape
    const half = tileSize / 2 * 0.866;  // cos(30°)
    const vert = tileSize / 2 * 0.5;    // sin(30°)
    const eOffset = elev * tileSize * 0.3;

    ctx.beginPath();
    ctx.moveTo(sx, sy - vert - eOffset);
    ctx.lineTo(sx + half, sy - eOffset);
    ctx.lineTo(sx, sy + vert - eOffset);
    ctx.lineTo(sx - half, sy - eOffset);
    ctx.closePath();

    // Elevation-based shade
    const shade = 1.0 - elev * 0.5;
    const r = parseInt(colors[0].slice(1,3), 16) * shade;
    const g = parseInt(colors[0].slice(3,5), 16) * shade;
    const b = parseInt(colors[0].slice(5,7), 16) * shade;
    ctx.fillStyle = `rgb(${Math.floor(r)},${Math.floor(g)},${Math.floor(b)})`;
    ctx.fill();

    // Outline
    ctx.strokeStyle = `rgba(0,0,0,${0.1 + elev * 0.3})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();

    // Resource indicator
    if (tile.resource) {
      ctx.fillStyle = '#ffd700';
      ctx.beginPath();
      ctx.arc(sx, sy - eOffset, tileSize * 0.08, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // HUD info
  document.getElementById('info').textContent =
    `${map.width}×${map.height} | zoom: ${camera.zoom.toFixed(1)}x`;
}

// ── Event handlers ──────────────────────────────────────────────────────────
canvas.addEventListener('mousedown', (e) => {
  dragging = true;
  dragStart = { x: e.clientX, y: e.clientY };
  camStart = { cx: camera.cx, cy: camera.cy };
});

canvas.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const dx = e.clientX - dragStart.x;
  const dy = e.clientY - dragStart.y;
  // Convert screen drag to world movement (inverse isometric)
  camera.cx = camStart.cx - (dx / 0.866 - dy / 0.5) / camera.zoom * 0.01;
  camera.cy = camStart.cy - (dx / 0.866 + dy / 0.5) / camera.zoom * 0.01;
  render();
});

canvas.addEventListener('mouseup', () => { dragging = false; });
canvas.addEventListener('mouseleave', () => { dragging = false; });

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  camera.zoom *= e.deltaY < 0 ? 1.1 : 0.9;
  camera.zoom = Math.max(0.2, Math.min(8, camera.zoom));
  render();
});

// ── Touch support ───────────────────────────────────────────────────────────
let lastTouches = null;
canvas.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    dragging = true;
    dragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    camStart = { cx: camera.cx, cy: camera.cy };
  }
  lastTouches = [...e.touches];
});
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches.length === 1 && dragging) {
    const dx = e.touches[0].clientX - dragStart.x;
    const dy = e.touches[0].clientY - dragStart.y;
    camera.cx = camStart.cx - (dx / 0.866 - dy / 0.5) / camera.zoom * 0.01;
    camera.cy = camStart.cy - (dx / 0.866 + dy / 0.5) / camera.zoom * 0.01;
  } else if (e.touches.length === 2 && lastTouches.length === 2) {
    const dist = (a, b) => Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
    const prev = dist(lastTouches[0], lastTouches[1]);
    const curr = dist(e.touches[0], e.touches[1]);
    camera.zoom *= curr / prev;
    camera.zoom = Math.max(0.2, Math.min(8, camera.zoom));
  }
  lastTouches = [...e.touches];
  render();
});
canvas.addEventListener('touchend', () => { dragging = false; lastTouches = null; });

// ── Drop zone ────────────────────────────────────────────────────────────────
document.addEventListener('dragover', (e) => {
  e.preventDefault();
  document.getElementById('drop-zone').classList.add('visible');
});
document.addEventListener('dragleave', () => {
  document.getElementById('drop-zone').classList.remove('visible');
});
document.addEventListener('drop', (e) => {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('visible');
  const file = e.dataTransfer.files[0];
  if (file) loadFileFromFile(file);
});

function loadFile(event) {
  const file = event.target.files[0];
  if (file) loadFileFromFile(file);
}

function loadFileFromFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      loadMapData(data);
    } catch (err) {
      alert('Invalid map file: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function loadMapData(data) {
  if (!data.tiles || !data.width || !data.height) {
    throw new Error('Map must have width, height, and tiles array');
  }
  map = data;
  camera.cx = map.width / 2;
  camera.cy = map.height / 2;
  camera.zoom = 1;
  render();
}

function resetView() {
  if (!map) return;
  camera.cx = map.width / 2;
  camera.cy = map.height / 2;
  camera.zoom = 1;
  render();
}

// ── Initialize ──────────────────────────────────────────────────────────────
function init() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  map = generateDemoMap();
  camera.cx = map.width / 2;
  camera.cy = map.height / 2;
  camera.zoom = 1;
  render();
}

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  render();
});

init();
</script>
</body>
</html>
